<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخمّن الشعارات الأيقوني</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .score-board {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .image-container {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px auto;
            background-color: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* تحجيم حاوية الـ SVG الداخلي لتأثير المربعات */
        .logo-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .logo-wrapper svg {
            width: 180px;
            height: 180px;
        }

        /* تكتيك البكسلة المربعة النظيفة بالـ CSS للأشكال */
        .lvl-hard {
            filter: blur(16px) contrast(300%) hue-rotate(0deg);
        }

        .lvl-medium {
            filter: blur(7px) contrast(180%);
        }

        .lvl-clear {
            filter: none;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 85%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease;
            margin: 5px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #0f172a;
            width: 90%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .hints-section {
            margin-top: 20px;
            border-top: 1px solid #475569;
            padding-top: 15px;
        }

        .hints-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .btn-hint {
            background-color: #334155;
            color: white;
            font-size: 13px;
            padding: 8px 12px;
        }

        .btn-hint:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            border: 1px solid #334155;
        }

        .hint-text {
            margin-top: 10px;
            font-size: 15px;
            color: #fcd34d;
            min-height: 20px;
            font-weight: 500;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameCard">
        <h1>مخمّن شعارات الأندية ⚽</h1>
        <div class="score-board">النظام: <span id="score">0</span> / 5</div>
        
        <div class="image-container">
            <div id="logoWrapper" class="logo-wrapper lvl-hard">
                </div>
        </div>

        <div class="input-section">
            <input type="text" id="guestInput" placeholder="اكتب اسم النادي (أو جزء منه)..." autocomplete="off">
            <br>
            <button class="btn btn-primary" onclick="checkAnswer()">تحقق من الإجابة</button>
        </div>

        <div class="hints-section">
            <div class="hints-title">وسائل المساعدة المتاحة:</div>
            <button class="btn btn-hint" id="hint1Btn" onclick="useHint1()">🔍 توضيح المربعات شوي</button>
            <button class="btn btn-hint" id="hint2Btn" onclick="useHint2()">🔤 أول حرف</button>
            <button class="btn btn-hint" id="hint3Btn" onclick="useHint3()">👤 لاعب معتزل</button>
            <div class="hint-text" id="hintDisplay"></div>
        </div>
    </div>

    <script>
        // مصفوفة الأندية مضاف إليها كود الـ SVG المباشر الموزون بألوان الأندية الأصلية
        const clubsData = [
            {
                names: ["ريال مدريد", "ريال", "مدريد", "real madrid", "madrid"],
                svg: `<svg viewBox="0 0 100 100">
                        <circle cx="50" cy="55" r="35" fill="none" stroke="#FEF102" stroke-width="6"/>
                        <circle cx="50" cy="55" r="30" fill="#FFFFFF" stroke="#00529F" stroke-width="2"/>
                        <path d="M25 35 L75 75" stroke="#8A1538" stroke-width="12"/>
                        <text x="50" y="62" font-size="22" font-family="Arial Black" font-weight="bold" fill="#00529F" text-anchor="middle">MC</text>
                        <path d="M35 22 L50 10 L65 22 Z" fill="#FEF102" stroke="#8A1538" stroke-width="2"/>
                      </svg>`,
                firstLetter: "ر",
                legend: "زين الدين زيدان"
            },
            {
                names: ["برشلونة", "برشلونه", "برشا", "barcelona", "barca"],
                svg: `<svg viewBox="0 0 100 100">
                        <path d="M20 20 C20 10, 80 10, 80 20 C80 50, 70 85, 50 95 C30 85, 20 50, 20 20 Z" fill="#A50044" stroke="#EDBB00" stroke-width="3"/>
                        <path d="M20 45 L80 45 L50 95 Z" fill="#004D98"/>
                        <path d="M20 45 L80 45 L80 20 L50 20 L20 20 Z" fill="#EDBB00"/>
                        <rect x="25" y="23" width="22" height="18" fill="#FFFFFF"/>
                        <path d="M36 23 L36 41 M25 32 L47 32" stroke="#A50044" stroke-width="3"/>
                        <rect x="53" y="23" width="22" height="18" fill="#EDBB00"/>
                        <path d="M58 23 L58 41 M64 23 L64 41 M70 23 L70 41" stroke="#000" stroke-width="2"/>
                        <rect x="30" y="45" width="40" height="10" fill="#EDBB00"/>
                        <text x="50" y="54" font-size="9" font-family="Arial" font-weight="bold" fill="#000" text-anchor="middle">FCB</text>
                        <circle cx="50" cy="70" r="6" fill="#EDBB00" stroke="#000" stroke-width="1"/>
                      </svg>`,
                firstLetter: "ب",
                legend: "رونالدينيو"
            },
            {
                names: ["مانشستر يونايتد", "اليونايتد", "مانشستر", "manchester united", "united"],
                svg: `<svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#DA291C" stroke="#FFE500" stroke-width="3"/>
                        <circle cx="50" cy="50" r="35" fill="#FFE500"/>
                        <rect x="25" y="40" width="50" height="20" fill="#DA291C"/>
                        <text x="50" y="55" font-size="8" font-family="Arial Black" font-weight="bold" fill="#FFE500" text-anchor="middle">MANCHESTER</text>
                        <text x="50" y="72" font-size="9" font-family="Arial Black" font-weight="bold" fill="#FFE500" text-anchor="middle">UNITED</text>
                        <path d="M42 22 L50 32 L58 22 Z" fill="#DA291C"/>
                      </svg>`,
                firstLetter: "م",
                legend: "ديفيد بيكهام"
            },
            {
                names: ["ميلان", "اي سي ميلان", "milan", "ac milan"],
                svg: `<svg viewBox="0 0 100 100">
                        <ellipse cx="50" cy="50" rx="32" ry="45" fill="#FFFFFF" stroke="#E32021" stroke-width="4"/>
                        <clipPath id="ovalClip"><ellipse cx="50" cy="50" rx="28" ry="41"/></clipPath>
                        <g clip-path="url(#ovalClip)">
                            <rect x="18" y="5" width="32" height="90" fill="#000000"/>
                            <rect x="25" y="5" width="6" height="90" fill="#E32021"/>
                            <rect x="37" y="5" width="6" height="90" fill="#E32021"/>
                            <rect x="50" y="5" width="35" height="90" fill="#FFFFFF"/>
                            <path d="M50 5 L50 95 M50 50 L85 50" stroke="#E32021" stroke-width="5"/>
                            <rect x="30" y="12" width="40" height="15" fill="#FFFFFF"/>
                            <text x="50" y="24" font-size="12" font-family="Arial Black" font-weight="bold" fill="#000" text-anchor="middle">ACM</text>
                            <rect x="40" y="70" width="20" height="12" fill="#FFFFFF"/>
                            <text x="50" y="80" font-size="10" font-family="Arial" fill="#000" text-anchor="middle">1899</text>
                        </g>
                      </svg>`,
                firstLetter: "م",
                legend: "باولو مالديني"
            },
            {
                names: ["بايرن ميونخ", "بايرن", "ميونخ", "bayern", "munich"],
                svg: `<svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#DC052D" stroke="#FFFFFF" stroke-width="3"/>
                        <circle cx="50" cy="50" r="32" fill="#0066B2" stroke="#FFFFFF" stroke-width="4"/>
                        <path d="M35 35 L65 35 L50 65 Z M42 45 L58 45" stroke="#FFFFFF" stroke-width="3" fill="none"/>
                        <text x="50" y="16" font-size="8" font-family="Arial Black" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FC BAYERN</text>
                        <text x="50" y="92" font-size="8" font-family="Arial Black" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MUNCHEN</text>
                      </svg>`,
                firstLetter: "ب",
                legend: "أوليفر كان"
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const logoWrapper = document.getElementById('logoWrapper');
        const guestInput = document.getElementById('guestInput');
        const hintDisplay = document.getElementById('hintDisplay');
        const scoreDisplay = document.getElementById('score');
        const gameCard = document.getElementById('gameCard');

        const hint1Btn = document.getElementById('hint1Btn');
        const hint2Btn = document.getElementById('hint2Btn');
        const hint3Btn = document.getElementById('hint3Btn');

        function loadQuestion() {
            if (currentIndex >= clubsData.length) {
                gameCard.innerHTML = `<h2>عاشت ايدك يا بطل! 🎉</h2><p>خلصت الـ 5 أندية بنجاح وتوقعتهم كلهم.</p><h3>نتيجتك: ${score} من 5</h3><button class="btn btn-primary" onclick="location.reload()">إعادة اللعب</button>`;
                return;
            }

            // حقن الـ SVG بداخل الواجهة مباشرة
            logoWrapper.className = "logo-wrapper lvl-hard";
            logoWrapper.innerHTML = clubsData[currentIndex].svg;
            
            guestInput.value = "";
            hintDisplay.innerText = "";
            
            hint1Btn.disabled = false;
            hint2Btn.disabled = false;
            hint3Btn.disabled = false;
        }

        function checkAnswer() {
            const userAnswer = guestInput.value.trim().toLowerCase();
            if(!userAnswer) return;

            const currentClub = clubsData[currentIndex];

            const isCorrect = currentClub.names.some(name => {
                const cleanName = name.toLowerCase();
                return cleanName.includes(userAnswer) || userAnswer.includes(cleanName);
            });

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                
                // تصفية الـ SVG بالكامل
                logoWrapper.className = "logo-wrapper lvl-clear";
                
                setTimeout(() => {
                    currentIndex++;
                    loadQuestion();
                }, 1300);
            } else {
                gameCard.classList.add('shake');
                setTimeout(() => gameCard.classList.remove('shake'), 300);
                hintDisplay.innerText = "الجواب مو صحيح، حاول مرة ثانية!";
            }
        }

        function useHint1() {
            logoWrapper.className = "logo-wrapper lvl-medium";
            hintDisplay.innerText = "تم توضيح المربعات قليلاً!";
            hint1Btn.disabled = true;
        }

        function useHint2() {
            hintDisplay.innerText = `أول حرف من النادي: (${clubsData[currentIndex].firstLetter})`;
            hint2Btn.disabled = true;
        }

        function useHint3() {
            hintDisplay.innerText = `لاعب أسطوري معتزل لعب بيهم: ${clubsData[currentIndex].legend}`;
            hint3Btn.disabled = true;
        }

        window.onload = loadQuestion;

        guestInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
