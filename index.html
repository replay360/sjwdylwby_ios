<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخمّن الشعارات الأيقوني</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .score-board {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .image-container {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px auto;
            background-color: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .logo-img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transition: filter 0.3s ease, width 0.3s ease, height 0.3s ease;
        }

        /* هنا تكتيك البكسلة المضمون اللي يشتغل على كل المتصفحات والسيرفرات بدون حظر */
        .lvl-hard {
            width: 14px; 
            height: 14px;
            filter: contrast(140%) brightness(100%);
        }

        .lvl-medium {
            width: 32px;
            height: 32px;
            filter: contrast(120%);
        }

        .lvl-clear {
            width: 85%;
            height: 85%;
            filter: none;
        }

        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 85%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease;
            margin: 5px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #0f172a;
            width: 90%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .hints-section {
            margin-top: 20px;
            border-top: 1px solid #475569;
            padding-top: 15px;
        }

        .hints-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .btn-hint {
            background-color: #334155;
            color: white;
            font-size: 13px;
            padding: 8px 12px;
        }

        .btn-hint:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            border: 1px solid #334155;
        }

        .hint-text {
            margin-top: 10px;
            font-size: 15px;
            color: #fcd34d;
            min-height: 20px;
            font-weight: 500;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameCard">
        <h1>مخمّن شعارات الأندية ⚽</h1>
        <div class="score-board">النظام: <span id="score">0</span> / 5</div>
        
        <div class="image-container">
            <img src="" alt="شعار النادي" class="logo-img lvl-hard" id="logoImage">
        </div>

        <div class="input-section">
            <input type="text" id="guestInput" placeholder="اكتب اسم النادي (أو جزء منه)..." autocomplete="off">
            <br>
            <button class="btn btn-primary" onclick="checkAnswer()">تحقق من الإجابة</button>
        </div>

        <div class="hints-section">
            <div class="hints-title">وسائل المساعدة المتاحة:</div>
            <button class="btn btn-hint" id="hint1Btn" onclick="useHint1()">🔍 توضيح المربعات شوي</button>
            <button class="btn btn-hint" id="hint2Btn" onclick="useHint2()">🔤 أول حرف</button>
            <button class="btn btn-hint" id="hint3Btn" onclick="useHint3()">👤 لاعب معتزل</button>
            <div class="hint-text" id="hintDisplay"></div>
        </div>
    </div>

    <script>
        // روابط أصلية ومباشرة من GitHub مستقرة 100%
        const clubsData = [
            {
                names: ["ريال مدريد", "ريال", "مدريد", "real madrid", "madrid"],
                img: "https://footylogos.github.io/res/logos/real-madrid.png",
                firstLetter: "ر",
                legend: "زين الدين زيدان"
            },
            {
                names: ["برشلونة", "برشلونه", "برشا", "barcelona", "barca"],
                img: "https://footylogos.github.io/res/logos/barcelona.png",
                firstLetter: "ب",
                legend: "رونالدينيو"
            },
            {
                names: ["مانشستر يونايتد", "اليونايتد", "مانشستر", "manchester united", "united"],
                img: "https://footylogos.github.io/res/logos/manchester-united.png",
                firstLetter: "م",
                legend: "ديفيد بيكهام"
            },
            {
                names: ["ميلان", "اي سي ميلان", "milan", "ac milan"],
                img: "https://footylogos.github.io/res/logos/ac-milan.png",
                firstLetter: "م",
                legend: "باولو مالديني"
            },
            {
                names: ["بايرن ميونخ", "بايرن", "ميونخ", "bayern", "munich"],
                img: "https://footylogos.github.io/res/logos/bayern-munich.png",
                firstLetter: "ب",
                legend: "أوليفر كان"
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const logoImage = document.getElementById('logoImage');
        const guestInput = document.getElementById('guestInput');
        const hintDisplay = document.getElementById('hintDisplay');
        const scoreDisplay = document.getElementById('score');
        const gameCard = document.getElementById('gameCard');

        const hint1Btn = document.getElementById('hint1Btn');
        const hint2Btn = document.getElementById('hint2Btn');
        const hint3Btn = document.getElementById('hint3Btn');

        function loadQuestion() {
            if (currentIndex >= clubsData.length) {
                gameCard.innerHTML = `<h2>عاشت ايدك يا بطل! 🎉</h2><p>خلصت الـ 5 أندية بنجاح وتوقعتهم كلهم.</p><h3>نتيجتك: ${score} من 5</h3><button class="btn btn-primary" onclick="location.reload()">إعادة اللعب</button>`;
                return;
            }

            logoImage.className = "logo-img lvl-hard";
            logoImage.src = clubsData[currentIndex].img;
            
            guestInput.value = "";
            hintDisplay.innerText = "";
            
            hint1Btn.disabled = false;
            hint2Btn.disabled = false;
            hint3Btn.disabled = false;
        }

        function checkAnswer() {
            const userAnswer = guestInput.value.trim().toLowerCase();
            if(!userAnswer) return;

            const currentClub = clubsData[currentIndex];

            const isCorrect = currentClub.names.some(name => {
                const cleanName = name.toLowerCase();
                return cleanName.includes(userAnswer) || userAnswer.includes(cleanName);
            });

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                
                logoImage.className = "logo-img lvl-clear";
                
                setTimeout(() => {
                    currentIndex++;
                    loadQuestion();
                }, 1300);
            } else {
                gameCard.classList.add('shake');
                setTimeout(() => gameCard.classList.remove('shake'), 300);
                hintDisplay.innerText = "الجواب مو صحيح، حاول مرة ثانية أو استخدم وسيلة مساعدة!";
            }
        }

        function useHint1() {
            logoImage.className = "logo-img lvl-medium";
            hintDisplay.innerText = "تم توضيح المربعات قليلاً!";
            hint1Btn.disabled = true;
        }

        function useHint2() {
            hintDisplay.innerText = `أول حرف من النادي: (${clubsData[currentIndex].firstLetter})`;
            hint2Btn.disabled = true;
        }

        function useHint3() {
            hintDisplay.innerText = `لاعب أسطوري معتزل لعب بيهم: ${clubsData[currentIndex].legend}`;
            hint3Btn.disabled = true;
        }

        window.onload = loadQuestion;

        guestInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
