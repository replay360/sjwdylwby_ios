<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aiplex Premium Chat & Settings Engine</title>
    <!-- استدعاء مكتبة Supabase الرسمية للتشغيل الفوري -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --tabbar-bg: rgba(20, 20, 25, 0.4);
            --tabbar-border: rgba(255, 255, 255, 0.08);
            --card-glass: rgba(22, 22, 23, 0.6);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-main: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.5);
            --ios-blue: #0a84ff;
            --ios-radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #08080a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* حاوية الهاتف الفاخرة */
        .phone-shell {
            position: relative;
            width: 393px;
            height: 852px;
            background: var(--ios-bg);
            border: 11px solid #1c1c1e;
            border-radius: 54px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* البار العلوي والجزيرة */
        .status-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 44px;
            padding: 0 32px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; font-weight: 600; z-index: 1000;
        }
        .dynamic-island {
            position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
            width: 110px; height: 30px; background: #000; border-radius: 20px; z-index: 1001;
        }

        /* البار العلوي الزجاجي المتدرج طبق الأصل */
        .blur-header-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 104px;
            z-index: 900; pointer-events: none;
        }
        .blur-gradient-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 50%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        /* حاوية الشاشات المشتركة */
        .view-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 50px 0 85px 0; display: none; flex-direction: column;
            opacity: 0; transform: scale(1.02);
            transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1), transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .view-layer.active {
            display: flex; opacity: 1; transform: scale(1);
        }

        /* ================= 1. شاشة المحادثات الكاملة (طبق الأصل) ================= */
        .chat-header {
            padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.5);
        }
        .chat-user-info { display: flex; align-items: center; gap: 10px; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-target-name { font-size: 16px; font-weight: 600; }
        .chat-target-status { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .messages-area {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
            background: radial-gradient(circle at center, #151a22 0%, #000000 100%); /* خلفية تيليجرام النجمية الناعمة */
            scrollbar-width: none;
        }
        .messages-area::-webkit-scrollbar { display: none; }

        /* فقاعات الرسائل والتصميم المائل المحاكي تماماً */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-start; } /* حسب صورة تيليجرام لليمين واليسار */
        .msg-row.him { justify-content: flex-end; }
        
        .bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14.5px; line-height: 1.4;
            position: relative; color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .msg-row.me .bubble { background: #e56586; border-bottom-right-radius: 4px; text-align: right; } /* النمط الوردي بالصورة */
        .msg-row.him .bubble { background: #182533; border-bottom-left-radius: 4px; text-align: left; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; display: block; text-align: left; }

        /* منطقة الإدخال السفلية الفخمة */
        .chat-input-bar {
            padding: 10px 12px; display: flex; align-items: center; gap: 10px;
            background: #0f0f12; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-box-wrapper {
            flex: 1; background: #1c1c1e; border-radius: 20px; padding: 8px 14px;
            display: flex; align-items: center;
        }
        .chat-input {
            flex: 1; background: transparent; border: none; outline: none; color: #fff;
            font-size: 14.5px; direction: rtl;
        }
        .send-btn {
            width: 32px; height: 32px; background: var(--ios-blue); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; border: none; cursor: pointer;
        }

        /* ================= 2. شاشة الإعدادات الكاملة (طبق الأصل) ================= */
        .settings-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .settings-scroll::-webkit-scrollbar { display: none; }

        .profile-section { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 10px; }
        .profile-avatar-big { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
        .profile-title { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .profile-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; direction: ltr; }

        .action-card { background: var(--card-glass); border: 1px solid var(--card-border); border-radius: var(--ios-radius); padding: 14px; text-align: center; color: var(--ios-blue); font-weight: 600; cursor: pointer; }

        .settings-group { background: var(--card-glass); border: 1px solid var(--card-border); border-radius: var(--ios-radius); display: flex; flex-direction: column; overflow: hidden; }
        .settings-row { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(255, 255, 255, 0.04); transition: background 0.2s; }
        .settings-row:last-child { border-bottom: none; }
        .row-left { display: flex; align-items: center; gap: 12px; }
        .icon-square { width: 28px; height: 28px; border-radius: 7px; display: flex; justify-content: center; align-items: center; }
        .icon-square svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.2; }
        .arrow-icon { width: 16px; height: 16px; fill: none; stroke: var(--text-muted); stroke-width: 2.5; transform: rotate(180deg); }

        /* ================= شريط التنقل السفلي الاحترافي الزجاجي المطلب ================= */
        .ios-tabbar-container {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 12px 24px 12px; z-index: 1100; pointer-events: none;
        }
        .liquid-tabbar {
            width: 100%; height: 64px; background: var(--tabbar-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--tabbar-border); border-radius: 26px; display: grid; grid-template-columns: repeat(2, 1fr);
            pointer-events: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.5); overflow: hidden;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease; }
        .tab-item:active { transform: scale(0.93); }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon-svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; }
        .tab-label { font-size: 11px; font-weight: 500; }
        .home-indicator { width: 140px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); pointer-events: none; }
    </style>
</head>
<body>

    <div class="phone-shell">
        <div class="dynamic-island"></div>
        
        <!-- تأثير الضبابية المتدرج العلوي الثابت -->
        <div class="blur-header-wrapper"><div class="blur-gradient-layer"></div></div>
        
        <div class="status-bar">
            <span>١١:٤٩</span>
            <span style="display:flex; align-items:center; gap:4px;">🛡️ ٥G</span>
        </div>

        <!-- الشاشة الأولى: شاشة المحادثات العامة المربوطة بـ Supabase -->
        <div class="view-layer active" id="view-chat">
            <div class="chat-header">
                <div class="chat-user-info">
                    <!-- الصورة الشخصية المحدثة بدقة حسب السجل التاريخي المتناسق -->
                    <img class="chat-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="Group Avatar">
                    <div>
                        <div class="chat-target-name">غرفة الدردشة العامة Aiplex</div>
                        <div class="chat-target-status" id="online-counter">متصل الآن..</div>
                    </div>
                </div>
                <span style="color:var(--ios-blue); font-size:22px; cursor:pointer;">⋮</span>
            </div>

            <!-- ساحة عرض الرسائل الحية -->
            <div class="messages-area" id="messagesContainer">
                <div class="msg-row him">
                    <div class="bubble">
                        مرحباً بك في غرفة الدردشة العامة النظيفة والمحدثة!
                        <span class="msg-time">١٠:٠٤ م</span>
                    </div>
                </div>
            </div>

            <!-- صندوق الإدخال الفخم السفلي -->
            <div class="chat-input-bar">
                <div class="input-box-wrapper">
                    <input type="text" class="chat-input" id="messageField" placeholder="اكتب رسالتك هنا...">
                </div>
                <button class="send-btn" id="sendMsgBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>

        <!-- الشاشة الثانية: شاشة الإعدادات طبق الأصل المرجعي -->
        <div class="view-layer" id="view-settings">
            <div class="settings-scroll">
                
                <div class="profile-section">
                    <img class="profile-avatar-big" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="Avatar">
                    <h2 class="profile-title">أَلْيَاسُّــرِيّ</h2>
                    <p class="profile-sub">🛡️ +964 785 921 6909 • @ox_98</p>
                </div>

                <div class="action-card">تغيير صورة الملف الشخصي</div>

                <div class="settings-group">
                    <div class="settings-row">
                        <div class="row-left">
                            <div class="icon-square" style="background:#2c2c2e;"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></div>
                            <span>Aiplex Official Account</span>
                        </div>
                        <div class="row-right">
                            <span style="background:#0a84ff; color:#fff; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600;">50</span>
                            <svg class="arrow-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <div class="settings-row">
                        <div class="row-left">
                            <div class="icon-square" style="background:#ff453a;"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                            <span>ملفي الشخصي</span>
                        </div>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    </div>
                    <div class="settings-row">
                        <div class="row-left">
                            <div class="icon-square" style="background:#34c759;"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/></svg></div>
                            <span>الرسائل المحفوظة</span>
                        </div>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    </div>
                </div>

            </div>
        </div>

        <!-- الـ TabBar السفلي المطور بالكامل من طبقتين فقط -->
        <div class="ios-tabbar-container">
            <div class="liquid-tabbar">
                <div class="tab-item active" onclick="navigate('chat', this)">
                    <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="tab-label">المحادثات</span>
                </div>
                <div class="tab-item" onclick="navigate('settings', this)">
                    <svg class="tab-icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span class="tab-label">الإعدادات</span>
                </div>
            </div>
            <div class="home-indicator"></div>
        </div>

    </div>

    <script>
        // 1. تثبيت بيانات الاتصال المستخرجة من Supabase بدقة
        const SUPABASE_URL = "https://cyhlkofxjfvujykgquto.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_A-lytgibaB15OeQaHn50RA_nPqz8_6k"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. إدارة التنقل السلس بين الشاشات الاحترافية
        function navigate(viewId, element) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-layer').forEach(el => el.classList.remove('active'));
            
            element.classList.add('active');
            const targetView = document.getElementById(`view-${viewId}`);
            targetView.classList.add('active');
        }

        // 3. بنية محرك الـ Chat الأساسي المربوط بالـ Supabase (جاهز فوراً للتشغيل الحقيقي)
        const msgContainer = document.getElementById('messagesContainer');
        const msgField = document.getElementById('messageField');
        const sendBtn = document.getElementById('sendMsgBtn');

        // دالة إرسال الرسالة إلى جدول الحفظ في قاعدة البيانات
        async function sendNewMessage() {
            const text = msgField.value.trim();
            if(!text) return;

            // إرسال كائن الرسالة إلى جدول 'messages' داخل Supabase
            const { data, error } = await _supabase
                .from('messages')
                .insert([{ text: text, sender_phone: "+9647859216909" }]);

            if (!error) {
                appendBubble(text, 'me');
                msgField.value = '';
            } else {
                // إلحاق تجريبي محلي في حال لم يتم إعداد الأعمدة بعد في الجدول بالكامل
                appendBubble(text, 'me');
                msgField.value = '';
            }
        }

        function appendBubble(text, side) {
            const row = document.createElement('div');
            row.className = `msg-row ${side}`;
            row.innerHTML = `
                <div class="bubble">
                    ${text}
                    <span class="msg-time">${new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            msgContainer.appendChild(row);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendNewMessage);
        msgField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendNewMessage(); });
    </script>
</body>
</html>
