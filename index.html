<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخمّن الشعارات الأيقوني</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .score-board {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* حاوية الشعار مع تأثيرات الضبابية والبكسلة */
        .image-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 25px auto;
            background-color: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .logo-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            /* التأثير البدائي: بكسلة قوية + ضباب عالي */
            filter: blur(12px) contrast(200%);
            image-rendering: pixelated;
            transition: filter 0.5s ease;
        }

        /* الخيارات والإدخال */
        .input-section {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease;
            margin: 5px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #0f172a;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        /* قسم وسائل المساعدة */
        .hints-section {
            margin-top: 20px;
            border-top: 1px solid #475569;
            padding-top: 15px;
        }

        .hints-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .btn-hint {
            background-color: #334155;
            color: white;
            font-size: 13px;
            padding: 8px 12px;
        }

        .btn-hint:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            border: 1px solid #334155;
        }

        .hint-text {
            margin-top: 10px;
            font-size: 14px;
            color: #fcd34d;
            min-height: 20px;
        }

        /* أنيميشن عند الإجابة الخطأ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameCard">
        <h1>مخمّن شعارات الأندية ⚽</h1>
        <div class="score-board">النظام: <span id="score">0</span> / 5</div>
        
        <div class="image-container">
            <img src="https://upload.wikimedia.org/wikipedia/en/5/5c/Real_Madrid_CF_logo.svg" alt="شعار النادي" class="logo-img" id="logoImage">
        </div>

        <div class="input-section">
            <input type="text" id="guestInput" placeholder="اكتب اسم النادي هنا..." autocomplete="off">
            <br><br>
            <button class="btn btn-primary" onclick="checkAnswer()">تحقق من الإجابة</button>
        </div>

        <div class="hints-section">
            <div class="hints-title">وسائل المساعدة المتاحة:</div>
            <button class="btn btn-hint" id="hint1Btn" onclick="useHint1()">🔍 توضيح الشعار شوي</button>
            <button class="btn btn-hint" id="hint2Btn" onclick="useHint2()">🔤 أول حرف</button>
            <button class="btn btn-hint" id="hint3Btn" onclick="useHint3()">👤 لاعب معتزل</button>
            <div class="hint-text" id="hintDisplay"></div>
        </div>
    </div>

    <script>
        // مصفوفة الأندية الـ 5 مع الروابط والمعلومات
        const clubsData = [
            {
                names: ["ريال مدريد", "ريال", "real madrid"],
                img: "https://upload.wikimedia.org/wikipedia/en/5/5c/Real_Madrid_CF_logo.svg",
                firstLetter: "ر",
                legend: "زين الدين زيدان"
            },
            {
                names: ["برشلونة", "برشلونه", "barcelona"],
                img: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_(crest).svg",
                firstLetter: "ب",
                legend: "رونالدينيو"
            },
            {
                names: ["مانشستر يونايتد", "اليونايتد", "manchester united"],
                img: "https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg",
                firstLetter: "م",
                legend: "ديفيد بيكهام"
            },
            {
                names: ["ميلان", "اي سي ميلان", "ac milan"],
                img: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg",
                firstLetter: "م",
                legend: "باولو مالديني"
            },
            {
                names: ["بايرن ميونخ", "بايرن", "bayern munich"],
                img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg",
                firstLetter: "ب",
                legend: "أوليفر كان"
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const logoImage = document.getElementById('logoImage');
        const guestInput = document.getElementById('guestInput');
        const hintDisplay = document.getElementById('hintDisplay');
        const scoreDisplay = document.getElementById('score');
        const gameCard = document.getElementById('gameCard');

        // أزرار المساعدة
        const hint1Btn = document.getElementById('hint1Btn');
        const hint2Btn = document.getElementById('hint2Btn');
        const hint3Btn = document.getElementById('hint3Btn');

        function loadQuestion() {
            if (currentIndex >= clubsData.length) {
                // نهاية اللعبة
                gameCard.innerHTML = `<h2>عاشت ايدك! 🎉</h2><p>خلصت الـ 5 أندية بنجاح.</p><h3>نتيجتك: ${score} من 5</h3><button class="btn btn-primary" onclick="location.reload()">إعادة اللعب</button>`;
                return;
            }

            // إعادة تعيين الشكل والمساعدات
            logoImage.src = clubsData[currentIndex].img;
            logoImage.style.filter = "blur(14px) contrast(200%)"; // بكسلة وضباب عالي بالبداية
            guestInput.value = "";
            hintDisplay.innerText = "";
            
            hint1Btn.disabled = false;
            hint2Btn.disabled = false;
            hint3Btn.disabled = false;
        }

        function checkAnswer() {
            const userAnswer = guestInput.value.trim().toLowerCase();
            const currentClub = clubsData[currentIndex];

            // التحقق إذا كان الجواب موجود بالأسماء المقبولة
            const isCorrect = currentClub.names.some(name => name.toLowerCase() === userAnswer);

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                // أنيميشن توضيح الشعار بالكامل قبل الانتقال للسؤال التالي
                logoImage.style.filter = "blur(0px) contrast(100%)";
                
                setTimeout(() => {
                    currentIndex++;
                    loadQuestion();
                }, 1200); // ينتظر ثانية وشوية حتى يشوف الشعار واضح
            } else {
                // تأثير اهتزاز الشاشة عند الخطأ
                gameCard.classList.add('shake');
                setTimeout(() => gameCard.classList.remove('shake'), 300);
                alert("الجواب خطأ، حاول مرة ثانية أو استخدم وسيلة مساعدة!");
            }
        }

        // وسيلة المساعدة 1: توضيح الشعار شوية (تقليل البلور)
        function useHint1() {
            logoImage.style.filter = "blur(6px) contrast(150%)";
            hintDisplay.innerText = "تم توضيح الشعار قليلاً!";
            hint1Btn.disabled = true;
        }

        // وسيلة المساعدة 2: أول حرف
        function useHint2() {
            hintDisplay.innerText = `أول حرف من اسم النادي هو: (${clubsData[currentIndex].firstLetter})`;
            hint2Btn.disabled = true;
        }

        // وسيلة المساعدة 3: لاعب معتزل
        function useHint3() {
            hintDisplay.innerText = `لاعب أسطوري معتزل لعب بيهم: ${clubsData[currentIndex].legend}`;
            hint3Btn.disabled = true;
        }

        // تشغيل أول سؤال تلقائياً عند فتح اللعبة
        window.onload = loadQuestion;
    </script>
</body>
</html>
