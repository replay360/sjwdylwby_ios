<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التصاميم الرياضية الاحترافية المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0b0d;
            --panel-bg: #131317;
            --text-color: #ffffff;
            --accent-color: #22c55e;
            --border-color: #24242b;
            --news-accent: #cc2027;
        }

        body {
            font-family: 'Cairo', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            min-height: 100vh;
        }

        /* شريط التبديل الرئيسي العلوي الكبير */
        .main-navigation-tabs {
            display: flex;
            width: 100%;
            max-width: 420px;
            background: #141419;
            padding: 6px;
            border-radius: 12px;
            border: 2px solid #2f2f3a;
            box-sizing: border-box;
            gap: 6px;
        }

        .nav-tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: transparent;
            color: #a1a1aa;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            transition: 0.2s ease;
            text-align: center;
        }

        .nav-tab-btn.active[data-target="page-news"] {
            background: var(--news-accent);
            color: #fff;
        }

        .nav-tab-btn.active[data-target="page-posters"] {
            background: var(--accent-color);
            color: #000;
        }

        /* حاويات الصفحات المنفصلة */
        .app-page {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 420px;
        }

        .app-page.active {
            display: flex;
        }

        /* ------------------ استايلات قسم الأخبار ------------------ */
        .workspace-news {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .design-template {
            width: 400px;
            height: 500px;
            min-width: 400px;
            min-height: 500px;
            position: relative;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .image-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        .user-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transition: filter 0.2s ease;
        }

        .f-hd { filter: contrast(1.25) brightness(1.05) saturate(1.1); }
        .f-smooth { filter: brightness(1.08) contrast(0.95) saturate(1.05) blur(0.3px); }
        .f-contrast { filter: contrast(1.35) saturate(1.25); }
        .f-cinematic { filter: contrast(1.15) saturate(0.65) hue-rotate(-5deg); }
        .f-warm { filter: sepia(0.2) contrast(1.15) saturate(1.1); }

        .bottom-smooth-shadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            z-index: 2;
        }

        .rights-text {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            display: flex;
            gap: 5px;
            direction: ltr;
        }

        .text-wrap {
            position: absolute;
            bottom: 25px;
            width: 100%;
            z-index: 6;
            text-align: center;
            padding: 0 25px;
            box-sizing: border-box;
            transition: bottom 0.3s ease;
        }

        .text-main {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .text-sub {
            font-size: 22px;
            font-weight: 900;
            color: var(--news-accent);
            margin: 10px 0 0 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .alarm-icon {
            display: none;
            width: 44px;
            height: 44px;
            background: linear-gradient(to bottom, #ff2a35, #cc2027);
            border-radius: 12px;
            margin: 0 auto 14px auto;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(204,32,39,0.5);
            border: 1px solid #b01a1f;
        }

        /* تفاصيل قوالب الأخبار */
        .tmpl-first .glow-background {
            position: absolute;
            bottom: -30px;
            width: 100%;
            height: 180px;
            z-index: 3;
            background: radial-gradient(circle, rgba(204,32,39,0.25) 0%, rgba(0,77,152,0.2) 50%, transparent 80%);
            filter: blur(15px);
        }
        .tmpl-first .text-sub { color: #ff4a4a; }

        .tmpl-second { border-radius: 0 0 45px 45px; }
        .tmpl-second .laporta-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 15, 52, 0.98) 0%, rgba(16, 26, 82, 0.85) 50%, transparent 100%);
            z-index: 3;
        }
        .tmpl-second .laporta-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 8px;
            display: flex;
            z-index: 4;
        }
        .tmpl-second .laporta-bar .b-red { flex: 1; background: #cc2027; }
        .tmpl-second .laporta-bar .b-blue { flex: 1; background: #004d98; }
        .tmpl-second .text-wrap { bottom: 35px; }
        .tmpl-second .text-sub { color: #ff3b3b; }

        .tmpl-third .rodri-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 44px;
            background: linear-gradient(to top, #050507 80%, rgba(5,5,7,0.2) 100%);
            z-index: 4;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .tmpl-third .rodri-subbar-left { width: 120px; height: 10px; background: #004d98; transform: skewX(-35deg); margin-left: -20px; margin-bottom: 5px; }
        .tmpl-third .rodri-subbar-right { width: 120px; height: 10px; background: #cc2027; transform: skewX(35deg); margin-right: -20px; margin-bottom: 5px; }
        .tmpl-third .alarm-icon { display: flex; }
        .tmpl-third .text-wrap { bottom: 60px; }
        .tmpl-third .text-sub { color: #cc2027; }

        .tmpl-fourth .side-glow-left { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: #004d98; z-index: 4; box-shadow: 4px 0 20px rgba(0, 77, 152, 0.8); }
        .tmpl-fourth .side-glow-right { position: absolute; top: 0; right: 0; width: 6px; height: 100%; background: #cc2027; z-index: 4; box-shadow: -4px 0 20px rgba(204, 32, 39, 0.8); }
        .tmpl-fourth .text-sub { color: #ff5252; }

        .tmpl-fifth .bottom-smooth-shadow { display: none; }
        .tmpl-fifth .kane-ambient { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(74,20,140,0.85) 0%, rgba(26,35,126,0.5) 60%, transparent 100%); z-index: 2; }
        .tmpl-fifth .text-wrap { bottom: 35px; padding: 0 15px; }
        .tmpl-fifth .text-main { display: inline-block; background-color: #b71c1c; color: #fff; padding: 4px 16px; font-size: 22px; text-shadow: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 8px; }
        .tmpl-fifth .text-sub { color: #fff; font-size: 24px; background: none; padding: 0; text-shadow: 0 2px 8px rgba(0,0,0,1); }

        .tmpl-sixth .bottom-smooth-shadow { display: none; }
        .tmpl-sixth .casado-gradient { position: absolute; bottom: 0; width: 100%; height: 45%; background: linear-gradient(to top, #4a148c 0%, #7b1fa2 40%, transparent 100%); opacity: 0.9; z-index: 2; }
        .tmpl-sixth .text-wrap { bottom: 30px; }
        .tmpl-sixth .text-main { color: #fff; font-size: 24px; text-shadow: 0 2px 6px rgba(0,0,0,0.8); background: rgba(74, 20, 140, 0.6); display: inline-block; padding: 2px 12px; border-radius: 4px; }
        .tmpl-sixth .text-sub { color: #fff; font-size: 22px; text-shadow: 0 2px 6px rgba(0,0,0,0.8); margin-top: 6px; }

        .template-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
        }

        .selector-btn-news {
            background: #141419;
            border: 2px solid #2f2f3a;
            color: #fff;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
            text-align: center;
        }

        .selector-btn-news.active {
            border-color: var(--news-accent);
            background: var(--news-accent);
        }

        .controls-news {
            background: #141419;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            border: 1px solid #23232a;
            box-sizing: border-box;
        }

        /* ------------------ استايلات قسم البوستر ------------------ */
        .control-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 14px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .control-panel h2 {
            margin: 0 0 12px 0;
            font-size: 16px;
            color: var(--accent-color);
            text-align: center;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 8px;
        }

        .input-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 11px;
            color: #a1a1aa;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #1c1c24;
            color: #fff;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input[type="color"] {
            padding: 2px;
            height: 34px;
        }

        .btn-download {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .poster-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #match-poster {
            width: 100vw;
            height: 100vw;
            max-width: 420px;
            max-height: 420px;
            position: relative;
            overflow: hidden;
            background: #0d0d11;
        }

        .bg-split { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 1; }
        .left-bg { width: 27%; background-color: #006233; border-top-left-radius: 80px; }
        .center-bg { width: 46%; background-color: #0d0d11; }
        .right-bg { width: 27%; background-color: #002366; border-top-right-radius: 80px; }
        .bottom-shadow { position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%); z-index: 6; pointer-events: none; }

        .player-img { position: absolute; z-index: 5; background-size: contain; background-repeat: no-repeat; background-position: bottom center; }
        #p-img-left { left: -12%; bottom: 0; width: 55%; height: 100%; }
        #p-img-right { right: -12%; bottom: 0; width: 55%; height: 100%; }

        .poster-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 4% 0 2% 0; box-sizing: border-box; text-align: center; }
        .top-section { display: flex; flex-direction: column; align-items: center; width: 46%; margin-top: 2%; }
        .tournament-logo { height: 9vw; max-height: 34px; object-fit: contain; margin-bottom: 2px; display: none; }

        .main-title { font-size: 5.5vw; font-weight: 900; color: #ffffff; margin: 0; white-space: nowrap; }
        @media(min-width: 420px) { .main-title { font-size: 23px; } }

        .sub-title { font-size: 2vw; color: #cccccc; margin: 2px 0; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media(min-width: 420px) { .sub-title { font-size: 8.5px; } }

        .round-text { font-size: 3vw; color: #e5e7eb; font-weight: bold; margin-top: 1px; white-space: nowrap; }
        @media(min-width: 420px) { .round-text { font-size: 13px; } }

        .mid-section { width: 46%; }
        .day-title { font-size: 7vw; font-weight: 900; margin: 0; color: #ffffff; white-space: nowrap; }
        @media(min-width: 420px) { .day-title { font-size: 30px; } }

        .date-title { font-size: 3.5vw; color: #dddddd; margin: 0; font-weight: bold; white-space: nowrap; }
        @media(min-width: 420px) { .date-title { font-size: 14.5px; } }

        .time-title { font-size: 9vw; font-weight: 900; color: #f1c40f; margin: 0; line-height: 1; text-shadow: 0 0 8px rgba(241, 196, 15, 0.25); }
        @media(min-width: 420px) { .time-title { font-size: 38px; } }

        .teams-badge { background: #ffffff; width: 62%; height: 15%; border-radius: 10px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 12; }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .flag-box { width: 13vw; height: 8.5vw; max-width: 54px; max-height: 34px; object-fit: cover; border-radius: 4px; border: 1px solid #cbd5e1; }
        .name-box { font-size: 4vw; font-weight: 900; color: #000000; margin-top: 3px; }
        @media(min-width: 420px) { .name-box { font-size: 16px; } }
        .center-line { width: 1px; height: 55%; background: #94a3b8; }

        .bottom-section { width: 46%; z-index: 11; }
        .stadium-title { font-size: 3.4vw; color: #ffffff; margin: 0 0 2px 0; font-weight: bold; white-space: nowrap; }
        @media(min-width: 420px) { .stadium-title { font-size: 13.5px; } }
        .live-title { font-size: 3.4vw; font-weight: bold; color: #e5e7eb; margin: 0; white-space: nowrap; }
        @media(min-width: 420px) { .live-title { font-size: 13.5px; } }

        .player-control-panel { width: 100%; background: var(--panel-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
        .player-selector { display: flex; background: #1c1c24; border-radius: 8px; padding: 4px; border: 1px solid var(--border-color); }
        
        .selector-btn { flex: 1; padding: 8px; background: transparent; color: #a1a1aa; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .selector-btn.active { background: var(--accent-color); color: #000; }

        .slider-item { display: flex; flex-direction: column; gap: 4px; }
        .slider-item label { font-size: 12px; color: #cbd5e1; display: flex; justify-content: space-between; }
        .slider-item input { width: 100%; accent-color: var(--accent-color); cursor: pointer; }

        /* العناصر المشتركة في اللوحات */
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        .control-group input[type="text"], 
        .control-group input[type="file"],
        .control-group input[type="range"] {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2f2f3a; background: #1a1a22; color: #fff; box-sizing: border-box;
        }

        .filter-container { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { flex: 1; min-width: 75px; background: #1a1a22; border: 1px solid #2f2f3a; color: #ccc; padding: 8px 2px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; text-align: center; }
        .filter-btn.active, .filter-btn:hover { border-color: var(--news-accent); background: #23232f; color: #fff; }
        button.download-btn-news { width: 100%; padding: 12px; background: var(--news-accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button.download-btn-news:hover { background: #a1161b; }
    </style>
</head>
<body>

    <div class="main-navigation-tabs">
        <button class="nav-tab-btn active" data-target="page-news" onclick="switchMainPage('page-news')">صانع الأخبار الرياضية</button>
        <button class="nav-tab-btn" data-target="page-posters" onclick="switchMainPage('page-posters')">صانع بوسترات المباريات</button>
    </div>

    <div id="page-news" class="app-page active">
        <div class="workspace-news">
            <div class="design-template tmpl-first" id="templateContainer">
                <div class="rights-text">
                    <span>AL HASSANI</span>
                    <span>|</span>
                    <span>الحساني</span>
                </div>

                <div class="glow-background" id="firstGlow"></div>
                <div class="laporta-glow" id="lpGlow" style="display:none;"></div>
                <div class="laporta-bar" id="lpBar" style="display:none;">
                    <div class="b-red"></div>
                    <div class="b-blue"></div>
                </div>

                <div class="rodri-bar" id="rdBar" style="display:none;">
                    <div class="rodri-subbar-left"></div>
                    <div class="rodri-subbar-right"></div>
                </div>

                <div class="side-glow-left" id="sideLeft" style="display:none;"></div>
                <div class="side-glow-right" id="sideRight" style="display:none;"></div>
                <div class="kane-ambient" id="kaneAmbient" style="display:none;"></div>
                <div class="casado-gradient" id="casadoGradient" style="display:none;"></div>

                <div class="image-container">
                    <img src="" id="playerImg" class="user-image" style="display: none;">
                </div>

                <div class="bottom-smooth-shadow" id="baseShadow"></div>
                
                <div class="text-wrap">
                    <div class="alarm-icon" id="alarmIcon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                    </div>
                    <h1 class="text-main" id="textMain">بيدري رودري</h1>
                    <h2 class="text-sub" id="textSub">خارج الحسابات</h2>
                </div>
            </div>

            <div class="template-selector">
                <button class="selector-btn-news active" id="btn-tmpl-first" onclick="changeStyle('first', this)">القالب الأول</button>
                <button class="selector-btn-news" id="btn-tmpl-second" onclick="changeStyle('second', this)">القالب الثاني</button>
                <button class="selector-btn-news" id="btn-tmpl-third" onclick="changeStyle('third', this)">القالب الثالث</button>
                <button class="selector-btn-news" id="btn-tmpl-fourth" onclick="changeStyle('fourth', this)">القالب الرابع</button>
                <button class="selector-btn-news" id="btn-tmpl-fifth" onclick="changeStyle('fifth', this)">القالب الخامس</button>
                <button class="selector-btn-news" id="btn-tmpl-sixth" onclick="changeStyle('sixth', this)">القالب السادس</button>
            </div>

            <div class="controls-news">
                <div class="control-group">
                    <label>صورة اللاعب:</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>
                
                <div class="control-group">
                    <label>الفلاتر الاحترافية:</label>
                    <div class="filter-container">
                        <button class="filter-btn active" id="flt-none" onclick="applyFilter('none', this)">بدون فلتر</button>
                        <button class="filter-btn" id="flt-f-hd" onclick="applyFilter('f-hd', this)">فلتر HD</button>
                        <button class="filter-btn" id="flt-f-smooth" onclick="applyFilter('f-smooth', this)">نعومة AI</button>
                        <button class="filter-btn" id="flt-f-contrast" onclick="applyFilter('f-contrast', this)">تباين عالٍ</button>
                        <button class="filter-btn" id="flt-f-cinematic" onclick="applyFilter('f-cinematic', this)">سينمائي</button>
                        <button class="filter-btn" id="flt-f-warm" onclick="applyFilter('f-warm', this)">دافئ</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>الحجم (تكبير / تصغير):</label>
                    <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1">
                </div>
                <div class="control-group">
                    <label>الموقع العمودي (فوق / تحت):</label>
                    <input type="range" id="ySlider" min="-300" max="300" step="1" value="0">
                </div>
                <div class="control-group">
                    <label>العنوان الرئيسي:</label>
                    <input type="text" id="textMainInput" value="بيدري رودري">
                </div>
                <div class="control-group">
                    <label>العنوان الفرعي:</label>
                    <input type="text" id="textSubInput" value="خارج الحسابات">
                </div>
                <button class="download-btn-news" id="downloadBtn">تحميل التصميم النهائي</button>
            </div>
        </div>
    </div>


    <div id="page-posters" class="app-page">
        <div class="control-panel">
            <h2>لوحة التحكم بالبوستر</h2>
            
            <div class="input-group">
                <label>شعار البطولة (صورة يدوي)</label>
                <input type="file" id="in-logo" accept="image/*">
            </div>

            <div class="input-group">
                <label>اسم البطولة</label>
                <input type="text" id="in-tour" value="كأس العالم">
            </div>
            <div class="input-group">
                <label>التفاصيل</label>
                <input type="text" id="in-sub" value="الولايات المتحدة الأمريكية - كندا - المكسيك 2026">
            </div>
            <div class="input-group">
                <label>الدور</label>
                <input type="text" id="in-rnd" value="دور ربع النهائي">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>اليوم</label>
                    <input type="text" id="in-dy" value="الخميس">
                </div>
                <div class="input-group">
                    <label>التاريخ</label>
                    <input type="text" id="in-dt" value="09.07.2026">
                </div>
            </div>
            <div class="input-group">
                <label>الوقت</label>
                <input type="text" id="in-tm" value="21:00">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>المنتخب الأيسر (أخضر)</label>
                    <input type="text" id="in-nl" value="المغرب">
                    <input type="color" id="in-cl" value="#006233" style="margin-top:4px;">
                    <label style="margin-top:4px;">العلم</label>
                    <input type="file" id="in-fl" accept="image/*">
                    <label style="margin-top:4px;">اللاعب</label>
                    <input type="file" id="in-pl" accept="image/*">
                </div>
                <div class="input-group">
                    <label>المنتخب الأيمن (أزرق)</label>
                    <input type="text" id="in-nr" value="فرنسا">
                    <input type="color" id="in-cr" value="#002366" style="margin-top:4px;">
                    <label style="margin-top:4px;">العلم</label>
                    <input type="file" id="in-fr" accept="image/*">
                    <label style="margin-top:4px;">اللاعب</label>
                    <input type="file" id="in-pr" accept="image/*">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>الملعب</label>
                    <input type="text" id="in-std" value="ملعب بوسطن">
                </div>
                <div class="input-group">
                    <label>الحقوق والتذييل</label>
                    <input type="text" id="in-brd" value="منقولة عبر صفحة الحساني">
                </div>
            </div>

            <button class="btn-download" onclick="exportPoster()">تحميل البوستر PNG</button>
        </div>

        <div class="poster-container">
            <div id="match-poster">
                <div class="bg-split">
                    <div class="left-bg" id="bg-l"></div>
                    <div class="center-bg"></div>
                    <div class="right-bg" id="bg-r"></div>
                </div>

                <div class="bottom-shadow"></div>

                <div class="player-img" id="p-img-left"></div>
                <div class="player-img" id="p-img-right"></div>

                <div class="poster-content">
                    <div class="top-section">
                        <img class="tournament-logo" id="t-logo" src="" alt="شعار البطولة">
                        <div class="main-title" id="t-tour">كأس العالم</div>
                        <div class="sub-title" id="t-sub">الولايات المتحدة الأمريكية - كندا - المكسيك 2026</div>
                        <div class="round-text" id="t-rnd">دور ربع النهائي</div>
                    </div>

                    <div class="mid-section">
                        <p class="day-title" id="t-dy">الخميس</p>
                        <p class="date-title" id="t-dt">09.07.2026</p>
                        <p class="time-title" id="t-tm">21:00</p>
                    </div>

                    <div class="teams-badge">
                        <div class="team-box">
                            <img class="flag-box" id="m-fl" src="https://flagcdn.com/w320/ma.png" alt="علم">
                            <div class="name-box" id="t-nl">المغرب</div>
                        </div>
                        <div class="center-line"></div>
                        <div class="team-box">
                            <img class="flag-box" id="m-fr" src="https://flagcdn.com/w320/fr.png" alt="علم">
                            <div class="name-box" id="t-nr">فرنسا</div>
                        </div>
                    </div>

                    <div class="bottom-section">
                        <p class="stadium-title" id="t-std">ملعب بوسطن</p>
                        <p class="live-title" id="t-brd">منقولة عبر صفحة الحساني</p>
                    </div>
                </div>
            </div>

            <div class="player-control-panel">
                <div class="player-selector">
                    <button type="button" class="selector-btn active" id="select-left" onclick="switchPlayer('left')">التحكم باللاعب الأيسر (الأخضر)</button>
                    <button type="button" class="selector-btn" id="select-right" onclick="switchPlayer('right')">التحكم باللاعب الأيمن (الأزرق)</button>
                </div>

                <div class="slider-item">
                    <label>الحجم (تكبير / تصغير): <span id="val-size">100%</span></label>
                    <input type="range" id="slider-size" min="50" max="160" value="100">
                </div>

                <div class="slider-item">
                    <label>الموقع الأفقي (يمين / يسار): <span id="val-x">0px</span></label>
                    <input type="range" id="slider-x" min="-120" max="120" value="0">
                </div>

                <div class="slider-item">
                    <label>الموقع العمودي (فوق / تحت): <span id="val-y">0px</span></label>
                    <input type="range" id="slider-y" min="-120" max="120" value="0">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. نظام التبديل بين الصفحات وحفظ التبويب النشط تلقائياً
        function switchMainPage(pageId) {
            document.querySelectorAll('.app-page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.querySelector(`[data-target="${pageId}"]`).classList.add('active');
            
            localStorage.setItem('active_app_tab', pageId);
        }

        // 2. إدارة ومتحكمات قسم الأخبار الرياضية
        const imageInput = document.getElementById('imageInput');
        const playerImg = document.getElementById('playerImg');
        const textMainInput = document.getElementById('textMainInput');
        const textSubInput = document.getElementById('textSubInput');
        const textMain = document.getElementById('textMain');
        const textSub = document.getElementById('textSub');
        const downloadBtn = document.getElementById('downloadBtn');
        const templateContainer = document.getElementById('templateContainer');
        
        const firstGlow = document.getElementById('firstGlow');
        const lpGlow = document.getElementById('lpGlow'); const lpBar = document.getElementById('lpBar');
        const rdBar = document.getElementById('rdBar'); const alarmIcon = document.getElementById('alarmIcon');
        const sideLeft = document.getElementById('sideLeft'); const sideRight = document.getElementById('sideRight');
        const kaneAmbient = document.getElementById('kaneAmbient'); const casadoGradient = document.getElementById('casadoGradient');
        const baseShadow = document.getElementById('baseShadow');

        const scaleSlider = document.getElementById('scaleSlider');
        const ySlider = document.getElementById('ySlider');

        let newsScale = 1;
        let newsY = 0;
        let activeNewsTmpl = 'first';
        let activeNewsFilter = 'none';

        const templateTexts = {
            first: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            second: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            third: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            fourth: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            fifth: { main: 'هاري كين', sub: 'إلى برشلونة؟' },
            sixth: { main: 'أتلتيكو يطرق باب كاسادو', sub: 'وبرشلونة ينتظر القرار !!' }
        };

        function updateNewsImageTransform() {
            playerImg.style.transform = `scale(${newsScale}) translateY(${newsY}px)`;
        }

        scaleSlider.addEventListener('input', (e) => { newsScale = e.target.value; updateNewsImageTransform(); saveNewsToLocalStorage(); });
        ySlider.addEventListener('input', (e) => { newsY = e.target.value; updateNewsImageTransform(); saveNewsToLocalStorage(); });

        textMainInput.addEventListener('input', () => {
            textMain.innerText = textMainInput.value;
            templateTexts[activeNewsTmpl].main = textMainInput.value;
            saveNewsToLocalStorage();
        });
        
        textSubInput.addEventListener('input', () => {
            textSub.innerText = textSubInput.value;
            templateTexts[activeNewsTmpl].sub = textSubInput.value;
            saveNewsToLocalStorage();
        });

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    playerImg.src = e.target.result;
                    playerImg.style.display = 'block';
                    try { localStorage.setItem('news_player_img_b64', e.target.result); } catch(err) { console.log("الصورة كبيرة على كاش المتصفح"); }
                }
                reader.readAsDataURL(file);
            }
        });

        function applyFilter(filterClass, btnElement) {
            playerImg.classList.remove('f-hd', 'f-smooth', 'f-contrast', 'f-cinematic', 'f-warm');
            if(filterClass !== 'none') { playerImg.classList.add(filterClass); }
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            activeNewsFilter = filterClass;
            saveNewsToLocalStorage();
        }

        function changeStyle(styleName, btnElement) {
            templateContainer.classList.remove('tmpl-first', 'tmpl-second', 'tmpl-third', 'tmpl-fourth', 'tmpl-fifth', 'tmpl-sixth');
            
            firstGlow.style.display = 'none'; lpGlow.style.display = 'none'; lpBar.style.display = 'none';
            rdBar.style.display = 'none'; alarmIcon.style.display = 'none';
            sideLeft.style.display = 'none'; sideRight.style.display = 'none';
            kaneAmbient.style.display = 'none'; casadoGradient.style.display = 'none';
            baseShadow.style.display = 'block'; 

            textMainInput.value = templateTexts[styleName].main;
            textSubInput.value = templateTexts[styleName].sub;
            textMain.innerText = templateTexts[styleName].main;
            textSub.innerText = templateTexts[styleName].sub;

            templateContainer.classList.add('tmpl-' + styleName);

            if (styleName === 'first') { firstGlow.style.display = 'block'; }
            else if (styleName === 'second') { lpGlow.style.display = 'block'; lpBar.style.display = 'flex'; }
            else if (styleName === 'third') { rdBar.style.display = 'flex'; alarmIcon.style.display = 'flex'; }
            else if (styleName === 'fourth') { sideLeft.style.display = 'block'; sideRight.style.display = 'block'; }
            else if (styleName === 'fifth') { kaneAmbient.style.display = 'block'; baseShadow.style.display = 'none'; }
            else if (styleName === 'sixth') { casadoGradient.style.display = 'block'; baseShadow.style.display = 'none'; }

            document.querySelectorAll('.selector-btn-news').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            activeNewsTmpl = styleName;
            saveNewsToLocalStorage();
        }

        function saveNewsToLocalStorage() {
            const newsData = {
                scale: newsScale,
                yPos: newsY,
                activeTmpl: activeNewsTmpl,
                activeFilter: activeNewsFilter,
                texts: templateTexts
            };
            localStorage.setItem('news_app_settings', JSON.stringify(newsData));
        }

        function loadNewsFromLocalStorage() {
            const saved = localStorage.getItem('news_app_settings');
            if(saved) {
                const parsed = JSON.parse(saved);
                newsScale = parsed.scale || 1;
                newsY = parsed.yPos || 0;
                scaleSlider.value = newsScale;
                ySlider.value = newsY;
                updateNewsImageTransform();

                if(parsed.texts) {
                    Object.assign(templateTexts, parsed.texts);
                }

                if(parsed.activeTmpl) {
                    const btn = document.getElementById('btn-tmpl-' + parsed.activeTmpl);
                    changeStyle(parsed.activeTmpl, btn);
                }
                if(parsed.activeFilter) {
                    const btn = document.getElementById('flt-' + parsed.activeFilter);
                    applyFilter(parsed.activeFilter, btn);
                }
            }
            const savedImg = localStorage.getItem('news_player_img_b64');
            if(savedImg) {
                playerImg.src = savedImg;
                playerImg.style.display = 'block';
            }
        }

        downloadBtn.addEventListener('click', () => {
            html2canvas(templateContainer, {
                useCORS: true, scale: 3, width: 400, height: 500, scrollX: 0, scrollY: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Al-Hassani-News.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });


        // 3. إدارة ومتحكمات قسم بوسترات المباريات (كودك الأصلي المطور)
        const links = [
            { i: 'in-tour', o: 't-tour' }, { i: 'in-sub', o: 't-sub' }, { i: 'in-rnd', o: 't-rnd' },
            { i: 'in-dy', o: 't-dy' }, { i: 'in-dt', o: 't-dt' }, { i: 'in-tm', o: 't-tm' },
            { i: 'in-nl', o: 't-nl' }, { i: 'in-nr', o: 't-nr' },
            { i: 'in-std', o: 't-std' }, { i: 'in-brd', o: 't-brd' }
        ];

        let currentPlayer = 'left'; 
        let playerData = {
            left: { size: 100, x: 0, y: 0 },
            right: { size: 100, x: 0, y: 0 }
        };

        function savePosterToLocalStorage() {
            const dataToSave = {
                playerData: playerData,
                colors: {
                    left: document.getElementById('in-cl').value,
                    right: document.getElementById('in-cr').value
                },
                texts: {}
            };
            links.forEach(item => { dataToSave.texts[item.i] = document.getElementById(item.i).value; });
            localStorage.setItem('poster_settings', JSON.stringify(dataToSave));
        }

        function loadPosterFromLocalStorage() {
            const savedData = localStorage.getItem('poster_settings');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                if (parsed.playerData) playerData = parsed.playerData;
                if (parsed.colors) {
                    document.getElementById('in-cl').value = parsed.colors.left;
                    document.getElementById('bg-l').style.backgroundColor = parsed.colors.left;
                    document.getElementById('in-cr').value = parsed.colors.right;
                    document.getElementById('bg-r').style.backgroundColor = parsed.colors.right;
                }
                if (parsed.texts) {
                    links.forEach(item => {
                        if (parsed.texts[item.i] !== undefined) {
                            document.getElementById(item.i).value = parsed.texts[item.i];
                            document.getElementById(item.o).innerText = parsed.texts[item.i];
                        }
                    });
                }
            }
            ['local_logo', 'local_fl', 'local_fr', 'local_pl', 'local_pr'].forEach(key => {
                const savedImg = localStorage.getItem(key);
                if (savedImg) {
                    if (key === 'local_logo') { const imgEl = document.getElementById('t-logo'); imgEl.src = savedImg; imgEl.style.display = 'block'; }
                    if (key === 'local_fl') document.getElementById('m-fl').src = savedImg;
                    if (key === 'local_fr') document.getElementById('m-fr').src = savedImg;
                    if (key === 'local_pl') document.getElementById('p-img-left').style.backgroundImage = `url('${savedImg}')`;
                    if (key === 'local_pr') document.getElementById('p-img-right').style.backgroundImage = `url('${savedImg}')`;
                }
            });
        }

        links.forEach(item => {
            document.getElementById(item.i).addEventListener('input', (e) => {
                document.getElementById(item.o).innerText = e.target.value;
                savePosterToLocalStorage();
            });
        });

        document.getElementById('in-cl').addEventListener('input', (e) => { document.getElementById('bg-l').style.backgroundColor = e.target.value; savePosterToLocalStorage(); });
        document.getElementById('in-cr').addEventListener('input', (e) => { document.getElementById('bg-r').style.backgroundColor = e.target.value; savePosterToLocalStorage(); });

        function switchPlayer(side) {
            currentPlayer = side;
            document.getElementById('select-left').classList.toggle('active', side === 'left');
            document.getElementById('select-right').classList.toggle('active', side === 'right');
            document.getElementById('slider-size').value = playerData[side].size;
            document.getElementById('slider-x').value = playerData[side].x;
            document.getElementById('slider-y').value = playerData[side].y;
            updateLabels();
        }

        function applyStyles(sideName) {
            const side = sideName || currentPlayer;
            const data = playerData[side];
            const el = document.getElementById(side === 'left' ? 'p-img-left' : 'p-img-right');
            let baseWidth = 55; let baseHeight = 100;
            el.style.width = `${baseWidth * (data.size / 100)}%`;
            el.style.height = `${baseHeight * (data.size / 100)}%`;
            let translateX = data.x; if(side === 'right') translateX = -translateX; 
            el.style.transform = `translate(${translateX}px, ${-data.y}px)`;
        }

        function updateLabels() {
            const data = playerData[currentPlayer];
            document.getElementById('val-size').innerText = data.size + '%';
            document.getElementById('val-x').innerText = data.x + 'px';
            document.getElementById('val-y').innerText = data.y + 'px';
        }

        document.getElementById('slider-size').addEventListener('input', (e) => { playerData[currentPlayer].size = parseInt(e.target.value); updateLabels(); applyStyles(); savePosterToLocalStorage(); });
        document.getElementById('slider-x').addEventListener('input', (e) => { playerData[currentPlayer].x = parseInt(e.target.value); updateLabels(); applyStyles(); savePosterToLocalStorage(); });
        document.getElementById('slider-y').addEventListener('input', (e) => { playerData[currentPlayer].y = parseInt(e.target.value); updateLabels(); applyStyles(); savePosterToLocalStorage(); });

        function setupImage(inId, outId, isBg, storageKey) {
            document.getElementById(inId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        if (isBg) { document.getElementById(outId).style.backgroundImage = `url('${ev.target.result}')`; } 
                        else { const imgEl = document.getElementById(outId); imgEl.src = ev.target.result; imgEl.style.display = 'block'; }
                        try { localStorage.setItem(storageKey, ev.target.result); } catch(e) { console.log("حجم الصورة كبير على الكاش"); }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        setupImage('in-logo', 't-logo', false, 'local_logo');
        setupImage('in-fl', 'm-fl', false, 'local_fl');
        setupImage('in-fr', 'm-fr', false, 'local_fr');
        setupImage('in-pl', 'p-img-left', true, 'local_pl');
        setupImage('in-pr', 'p-img-right', true, 'local_pr');

        function exportPoster() {
            const poster = document.getElementById('match-poster');
            html2canvas(poster, {
                useCORS: true, scale: 3, logging: false, width: poster.offsetWidth, height: poster.offsetHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `بوستر_مباراة_${document.getElementById('in-nl').value}_و_${document.getElementById('in-nr').value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // 4. تشغيل كافة الاسترجاعات التلقائية والتبويبات فور فتح الصفحة
        window.onload = function() {
            // استرجاع الصفحة الأخيرة التي فتحها المستخدم
            const lastTab = localStorage.getItem('active_app_tab');
            if (lastTab) {
                switchMainPage(lastTab);
            } else {
                switchMainPage('page-news'); // افتراضي
            }

            // تحميل كاش الأخبار والبوسترات
            loadNewsFromLocalStorage();
            loadPosterFromLocalStorage();
            
            // تهيئة استايلات اللاعبين للبوستر
            applyStyles('left');
            applyStyles('right');
        };
    </script>
</body>
</html>
