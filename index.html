<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Center iOS Pro</title>
    <style>
        :root {
            --ios-blur: blur(35px);
            --card-bg: rgba(28, 28, 30, 0.45);
            --card-border: rgba(255, 255, 255, 0.06);
            --btn-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #ffffff;
        }

        /* حاوية الهاتف بأبعاد iPhone 15 Pro Max الدقيقة */
        .phone-frame {
            position: relative;
            width: 393px;
            height: 852px;
            background: url('1000023143.png') no-repeat center/cover;
            background-color: #1c1c1e;
            border: 10px solid #2c2c2e;
            border-radius: 50px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        /* الجزيرة التفاعلية الفوق */
        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000000;
            border-radius: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        /* الشاشة الرئيسية وتطبيقاتها */
        .home-screen {
            width: 100%;
            height: 100%;
            padding: 80px 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s ease;
        }

        /* تأثير التراجع والضبابية عند نزول مركز التحكم */
        .phone-frame.panel-open .home-screen {
            transform: scale(0.94);
            filter: blur(20px) brightness(0.6);
        }

        /* ==================== لوحة مركز التحكم الفخمة ==================== */
        .control-center {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 900;
            padding: 55px 16px 30px 16px;
            display: flex;
            flex-direction: column;
            background-color: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transform: translateY(-100%);
            will-change: transform, backdrop-filter;
        }

        /* شبكة مركز التحكم المطابقة تماماً للصورة */
        .cc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 20px;
        }

        /* الكروت الأساسية الزجاجية */
        .cc-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 12px;
            height: 142px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* كارت الاتصالات (أعلى اليمين) */
        .connectivity-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            align-items: center;
            justify-items: center;
        }

        /* الأزرار الدائرية بداخل الكروت */
        .cc-circle-btn {
            width: 52px;
            height: 52px;
            background-color: var(--btn-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.15, 0.85, 0.45, 1.3);
        }

        .cc-circle-btn:active {
            transform: scale(0.85);
        }

        /* ألوان الأزرار المفعلة الحقيقية للـ iOS */
        .cc-circle-btn.active.wifi { background-color: #007aff; }
        .cc-circle-btn.active.airdrop { background-color: #007aff; }
        .cc-circle-btn.active.bluetooth { background-color: #007aff; }
        .cc-circle-btn.active.airplane { background-color: #ff9500; }

        /* قواطع الصوت والسطوع (الكبسولات الاحترافية الطولية بالمليم) */
        .sliders-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 14px;
        }

        .cc-capsule-slider {
            position: relative;
            height: 142px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            overflow: hidden;
            cursor: ns-resize;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .slider-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* القيمة الابتدائية */
            background-color: #ffffff;
            pointer-events: none;
            transition: height 0.05s linear;
        }

        .slider-icon-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            mix-blend-mode: difference;
            width: 24px;
            height: 24px;
        }

        /* صف أزرار الأدوات الدائرية الصغيرة (الجرس، القفل) */
        .utility-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 14px;
        }

        .cc-square-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            height: 64px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.15, 0.85, 0.45, 1.3);
        }

        .cc-square-card:active {
            transform: scale(0.92);
        }

        /* كارت التركيز المستطيل (Focus) */
        .focus-card {
            grid-column: span 2;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            height: 54px;
            margin-top: 14px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            cursor: pointer;
        }

        /* الصف السفلي من الأزرار الدائرية المغمورة (ريموت، كاميرا، ليرز) */
        .bottom-tools-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 14px;
        }

        .tool-circle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.15, 0.85, 0.45, 1.3);
        }

        .tool-circle:active {
            transform: scale(0.88);
        }

        /* ==================== الأيقونات المرسومة بالـ CSS الصافي ==================== */
        .icon-wifi-svg, .icon-bluetooth-svg, .icon-plane-svg, .icon-airdrop-svg, .icon-sun-svg, .icon-vol-svg, .icon-bell-svg, .icon-lock-svg, .icon-moon-svg, .icon-torch-svg, .icon-cam-svg {
            width: 22px; height: 22px; fill: none; stroke: #ffffff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* منطقة السحب العلوية والسفلية الحساسة جداً */
        .top-drag-handle {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            z-index: 999; cursor: ns-resize;
        }

        .bottom-close-bar {
            width: 45px; height: 4.5px; background-color: rgba(255, 255, 255, 0.35);
            border-radius: 10px; position: absolute; bottom: 12px; left: 50%;
            transform: translateX(-50%); cursor: ns-resize;
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="iphoneFrame">
        <div class="dynamic-island"></div>
        
        <div class="top-drag-handle" id="triggerZone"></div>

        <div class="home-screen">
            <div style="width:60px; height:60px; background:linear-gradient(135deg, #2ecc71, #27ae60); border-radius:14px;"></div>
            <div style="width:60px; height:60px; background:linear-gradient(135deg, #3498db, #2980b9); border-radius:14px;"></div>
            <div style="width:60px; height:60px; background:linear-gradient(135deg, #e74c3c, #c0392b); border-radius:14px;"></div>
            <div style="width:60px; height:60px; background:linear-gradient(135deg, #f1c40f, #f39c12); border-radius:14px;"></div>
        </div>

        <div class="control-center" id="ccPanel">
            
            <div class="cc-grid">
                <div class="cc-card" style="display:flex; flex-direction:column; justify-content:center; align-items:center; gap:8px;">
                    <span style="font-size:12px; color:rgba(255,255,255,0.4); font-weight:600;">متوقف</span>
                    <svg viewBox="0 0 24 24" style="width:28px; height:28px; fill:#fff;"><path d="M8 5v14l11-7z"/></svg>
                </div>

                <div class="cc-card connectivity-card">
                    <div class="cc-circle-btn" onclick="toggleNetwork(this)"><svg class="icon-plane-svg" viewBox="0 0 24 24"><path d="M22 16v-2l-8.5-5V3.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5V9L2 14v2l8.5-2.5V19L8 20.5V22l4-1 4 1v-1.5L13.5 19v-5.5L22 16z"/></svg></div>
                    <div class="cc-circle-btn active airdrop" onclick="toggleNetwork(this)"><svg class="icon-airdrop-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3a9 9 0 0 1 9 9/M3 12a9 9 0 0 1 9-9"/></svg></div>
                    <div class="cc-circle-btn active wifi" onclick="toggleNetwork(this)"><svg class="icon-wifi-svg" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a5.5 5.5 0 0 1 6.95 0M12 20h.01"/></svg></div>
                    <div class="cc-circle-btn active bluetooth" onclick="toggleNetwork(this)"><svg class="icon-bluetooth-svg" viewBox="0 0 24 24"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg></div>
                </div>
            </div>

            <div class="sliders-row">
                <div class="cc-capsule-slider" onpointerdown="handleSlider(event, this)">
                    <div class="slider-fill" style="height: 65%;"></div>
                    <div class="slider-icon-center">
                        <svg class="icon-sun-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    </div>
                </div>
                <div class="cc-capsule-slider" onpointerdown="handleSlider(event, this)">
                    <div class="slider-fill" style="height: 45%;"></div>
                    <div class="slider-icon-center">
                        <svg class="icon-vol-svg" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    </div>
                </div>
            </div>

            <div class="utility-row">
                <div class="cc-square-card" onclick="this.style.background=this.style.background==''?'#fff':'';">
                    <svg class="icon-bell-svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
                <div class="cc-square-card">
                    <svg class="icon-lock-svg" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
            </div>

            <div class="focus-card">
                <div style="display:flex; align-items:center; gap:10px;">
                    <svg class="icon-moon-svg" viewBox="0 0 24 24" style="stroke:#5856d6;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <span style="font-size:14px; font-weight:600; color:#fff;">التركيز</span>
                </div>
                <svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:#fff;"><path d="M12 5.5l6 6H6z" transform="rotate(180 12 12)"/></svg>
            </div>

            <div class="bottom-tools-grid">
                <div class="tool-circle" id="torchBtn" onclick="this.classList.toggle('active')">
                    <svg class="icon-torch-svg" viewBox="0 0 24 24"><path d="M18 2H6v3l4 4v9a2 2 0 0 0 2 2 2 2 0 0 0 2-2v-9l4-4V2z"/></svg>
                </div>
                <div class="tool-circle">
                    <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:none; stroke:#fff; stroke-width:2.2;"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="14" r="2"/></svg>
                </div>
                <div class="tool-circle">
                    <svg class="icon-cam-svg" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <div class="tool-circle">
                    <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:none; stroke:#fff; stroke-width:2.2;"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/></svg>
                </div>
            </div>

            <div class="bottom-close-bar" id="closeBar"></div>
        </div>
    </div>

    <script>
        const frame = document.getElementById('iphoneFrame');
        const cc = document.getElementById('ccPanel');
        const trigger = document.getElementById('triggerZone');
        const closeBar = document.getElementById('closeBar');

        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        const maxDrag = 852; // طول الشاشة كامل

        // استماع لأحداث اللمس لعمل سحبة تتبع الإصبع 100%
        trigger.addEventListener('pointerdown', (e) => {
            startY = e.clientY;
            isDragging = true;
            cc.style.transition = 'none';
            frame.style.transition = 'none';
            trigger.setPointerCapture(e.pointerId);
        });

        trigger.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            currentY = e.clientY - startY;
            
            if (currentY >= 0 && currentY <= maxDrag) {
                // تدرج في النزول مع حركة الإصبع
                cc.style.transform = `translateY(${-maxDrag + currentY}px)`;
                
                // هندسة تأثير الـ Blur المتدرج مع السحب
                let progress = currentY / maxDrag;
                cc.style.backdropFilter = `blur(${progress * 35}px)`;
                cc.style.webkitBackdropFilter = `blur(${progress * 35}px)`;
                cc.style.backgroundColor = `rgba(0, 0, 0, ${progress * 0.5})`;
            }
        });

        trigger.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            
            // إذا سحب أكثر من ربع الشاشة يثبت ويشتغل تأثير المطاط والارتداد الزنبركي (iOS Spring Effect)
            if (currentY > 150) {
                frame.classList.add('panel-open');
                cc.style.transition = 'transform 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.28), backdrop-filter 0.3s';
                cc.style.transform = 'translateY(0)';
                cc.style.backdropFilter = 'blur(35px)';
                cc.style.webkitBackdropFilter = 'blur(35px)';
                cc.style.backgroundColor = 'rgba(0, 0, 0, 0.55)';
            } else {
                // ارتداد وغلق إذا كانت السحبة قصيرة
                closePanel();
            }
        });

        // شريط الغلق السفلي
        closeBar.addEventListener('pointerdown', () => {
            closePanel();
        });

        function closePanel() {
            frame.classList.remove('panel-open');
            cc.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            cc.style.transform = 'translateY(-100%)';
            cc.style.backdropFilter = 'blur(0px)';
            cc.style.webkitBackdropFilter = 'blur(0px)';
            cc.style.backgroundColor = 'rgba(0, 0, 0, 0)';
            currentY = 0;
        }

        function toggleNetwork(btn) {
            btn.classList.toggle('active');
        }

        // سلايدر الكبسولة الدقيق (اللمس والتحكم الحقيقي)
        function handleSlider(e, container) {
            const fill = container.querySelector('.slider-fill');
            const rect = container.getBoundingClientRect();
            container.setPointerCapture(e.pointerId);

            function update(clientY) {
                let y = clientY - rect.top;
                let pct = 100 - (y / rect.height * 100);
                pct = Math.max(0, Math.min(100, pct));
                fill.style.height = pct + '%';
            }
            update(e.clientY);

            container.onpointermove = (ev) => update(ev.clientY);
            container.onpointerup = () => {
                container.onpointermove = null;
                container.onpointerup = null;
                // تأثير ارتداد مطاطي خفيف للكبسولة عند الإفلات
                container.style.transform = 'scale(1.03)';
                setTimeout(() => container.style.transform = '', 140);
            };
        }
    </script>
</body>
</html>
