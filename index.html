<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستطيل الجيلي الاحترافي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #080415; }
        /* خلفية سينمائية متحركة بـ 5 ألوان متداخلة ببطء */
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(135deg, #090518, #140931, #2e083f, #4a0e3f, #0f2b3c);
            background-size: 400% 400%; animation: ultraGradient 16s ease infinite;
        }
        @keyframes ultraGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="jellyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('jellyCanvas');
        const ctx = canvas.getContext('2d');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // إعدادات الفيزياء الصارمة لضمان الثقل ومنع الاختفاء
        const STIFFNESS = 0.15; const DAMPING = 0.82; const MAX_VEL = 15;
        const ROWS = 5; const COLS = 8; const SPACING = 30;
        let particles = [], springs = [], dragged = null;

        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.mass = 1.6; }
            update() {
                if (this === dragged) return;
                this.vx *= DAMPING; this.vy *= DAMPING;
                this.vx = Math.max(-MAX_VEL, Math.min(MAX_VEL, this.vx));
                this.vy = Math.max(-MAX_VEL, Math.min(MAX_VEL, this.vy));
                this.x += this.vx; this.y += this.vy;
                // جدران وهمية تمنع الطيران خارج الشاشة
                const b = 30;
                if (this.x < b) { this.x = b; this.vx *= -0.3; }
                if (this.x > canvas.width - b) { this.x = canvas.width - b; this.vx *= -0.3; }
                if (this.y < b) { this.y = b; this.vy *= -0.3; }
                if (this.y > canvas.height - b) { this.y = canvas.height - b; this.vy *= -0.3; }
            }
        }

        class Spring {
            constructor(p1, p2, len) { this.p1 = p1; this.p2 = p2; this.len = len; }
            update() {
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy); if (dist === 0) return;
                let force = ((this.len - dist) / dist) * STIFFNESS;
                let fx = dx * force, fy = dy * force;
                if (this.p1 !== dragged) { this.p1.vx -= fx / this.p1.mass; this.p1.vy -= fy / this.p1.mass; }
                if (this.p2 !== dragged) { this.p2.vx += fx / this.p2.mass; this.p2.vy += fy / this.p2.mass; }
            }
        }

        function init() {
            particles = []; springs = [];
            let sx = (canvas.width - (COLS - 1) * SPACING) / 2;
            let sy = (canvas.height - (ROWS - 1) * SPACING) / 2;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) { particles.push(new Particle(sx + c * SPACING, sy + r * SPACING)); }
            }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let i = r * COLS + c;
                    if (c < COLS - 1) springs.push(new Spring(particles[i], particles[i + 1], SPACING));
                    if (r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS], SPACING));
                    if (c < COLS - 1 && r < ROWS - 1) {
                        let d = Math.sqrt(2) * SPACING;
                        springs.push(new Spring(particles[i], particles[i + COLS + 1], d));
                        springs.push(new Spring(particles[i + 1], particles[i + COLS], d));
                    }
                }
            }
        }
        init();

        // دمج أحداث الماوس واللمس لتقليل حجم الكود وتجنب الانقطاع
        function توجيه(e) {
            let t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }
        window.addEventListener('mousedown', (e) => start(توجيه(e).x, توجيه(e).y));
        window.addEventListener('mousemove', (e) => move(توجيه(e).x, توجيه(e).y));
        window.addEventListener('mouseup', () => dragged = null);
        window.addEventListener('touchstart', (e) => start(توجيه(e).x, توجيه(e).y), { passive: true });
        window.addEventListener('touchmove', (e) => move(توجيه(e).x, توجيه(e).y), { passive: true });
        window.addEventListener('touchend', () => dragged = null);

        function start(mx, my) {
            let close = null, minDist = 60;
            particles.forEach(p => { let d = Math.hypot(p.x - mx, p.y - my); if (d < minDist) { minDist = d; close = p; } });
            dragged = close;
        }
        function move(mx, my) { if (dragged) { dragged.x = mx; dragged.y = my; dragged.vx = 0; dragged.vy = 0; } }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let k = 0; k < 4; k++) springs.forEach(s => s.update());
            particles.forEach(p => p.update());

            // رسم المستطيل بحواف قطرية دائرية ناعمة وتأثير ضبابي
            ctx.beginPath();
            // مسار الحواف الخارجية للشبكة
            for (let c = 0; c < COLS; c++) ctx.lineTo(particles[c].x, particles[c].y);
            for (let r = 1; r < ROWS; r++) ctx.lineTo(particles[r * COLS + (COLS - 1)].x, particles[r * COLS + (COLS - 1)].y);
            for (let c = COLS - 2; c >= 0; c--) ctx.lineTo(particles[(ROWS - 1) * COLS + c].x, particles[(ROWS - 1) * COLS + c].y);
            for (let r = ROWS - 2; r >= 0; r--) ctx.lineTo(particles[r * COLS].x, particles[r * COLS].y);
            ctx.closePath();

            ctx.lineJoin = "round"; // جعل الحواف قطرية ودائرية وليست حادة
            ctx.lineWidth = 15;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
            ctx.stroke();

            // لون المستطيل الضبابي (يعمل عمل الزجاج frosted glass)
            ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
            ctx.fill();
            
            // تحديد داخلي ناعم
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
            ctx.stroke();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
