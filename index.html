        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        // إعدادات فيزيائية موزونة ومستقرة تماماً
        const GRAVITY = 0.0; 
        const STIFFNESS = 0.03; // تقليل الصلابة لمنع الانفجار الفيزيائي
        const DAMPING = 0.85;   // الحفاظ على ثقل الجيلي ولزوجته
        const ROWS = 6;         
        const COLS = 10;        
        const SPACING = 25;     

        let particles = [];
        let springs = [];
        let draggedParticle = null;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.mass = 1.0;
                this.radius = 10;
            }
            update() {
                if (this === draggedParticle) return;
                
                this.vx *= DAMPING;
                this.vy *= DAMPING;
                this.x += this.vx;
                this.y += this.vy;

                // كود حماية: يمنع النقاط من الخروج خارج شاشة الموقع
                if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.5; }
                if (this.x > canvas.width - this.radius) { this.x = canvas.width - this.radius; this.vx *= -0.5; }
                if (this.y < this.radius) { this.y = this.radius; this.vy *= -0.5; }
                if (this.y > canvas.height - this.radius) { this.y = canvas.height - this.radius; this.vy *= -0.5; }
            }
        }

        class Spring {
            constructor(p1, p2, length) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = length;
            }
            update() {
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance === 0) return;
                
                let diff = this.length - distance;
                // معادلة الحركة التوافقية لضمان مرونة الجيلي بدون طاقة زائدة
                let force = (diff / distance) * STIFFNESS;
                
                let fx = dx * force;
                let fy = dy * force;

                if (this.p1 !== draggedParticle) {
                    this.p1.vx -= fx / this.p1.mass;
                    this.p1.vy -= fy / this.p1.mass;
                }
                if (this.p2 !== draggedParticle) {
                    this.p2.x += fx / this.p2.mass;
                    this.p2.y += fy / this.p2.mass;
                }
            }
        }

        function initJelly() {
            particles = [];
            springs = [];
            let startX = (canvas.width - (COLS - 1) * SPACING) / 2;
            let startY = (canvas.height - (ROWS - 1) * SPACING) / 2;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    particles.push(new Particle(startX + c * SPACING, startY + r * SPACING));
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let i = r * COLS + c;
                    if (c < COLS - 1) springs.push(new Spring(particles[i], particles[i + 1], SPACING));
                    if (r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS], SPACING));
                    if (c < COLS - 1 && r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS + 1], Math.sqrt(2) * SPACING));
                    if (c > 0 && r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS - 1], Math.sqrt(2) * SPACING));
                }
            }
        }

            }
        }

            draggedParticle = null;
