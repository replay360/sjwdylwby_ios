<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 18 Perfect Control Center - Real Jelly Drag</title>
    <style>
        :root {
            --ios-blur: blur(40px);
            --card-bg: rgba(255, 255, 255, 0.11);
            --card-border: rgba(255, 255, 255, 0.07);
            --ios-blue: #2f89fc;
            --ios-green: #34c759;
            --ios-grey: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* حاوية الهاتف المطابقة تماماً لـ IMG_20260622_123332_2.jpg */
        .phone-frame {
            position: relative;
            width: 393px;
            height: 852px;
            background: linear-gradient(180deg, #182848 0%, #2b5876 100%);
            border: 12px solid #e3e3e3;
            border-radius: 55px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000000;
            border-radius: 20px;
            z-index: 1000;
        }

        .status-bar {
            position: absolute;
            top: 16px;
            width: 100%;
            padding: 0 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            z-index: 999;
        }

        /* لوحة مركز التحكم بنظام iOS 18 الشفاف */
        .control-center-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 70px 16px 20px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* تقسيم الصفوف لتطابق الشبكة الأصلية */
        .cc-row-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .cc-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            height: 156px;
            padding: 14px;
            position: relative;
            /* سلاسة الارتداد عند الإفلات */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        /* تفاصيل كارت الموسيقى (يسار) */
        .music-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .music-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .music-status {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            margin-top: 10px;
        }
        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            margin-bottom: 8px;
        }

        /* تفاصيل كارت الاتصالات المطور (يمين) */
        .connectivity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: 100%;
        }

        /* أزرار الاتصالات الدائرية الكبيرة */
        .conn-btn {
            background: var(--ios-grey);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
        }
        .conn-btn.active-blue { background: var(--ios-blue); }
        
        /* المربع المصغر السفلي (بلوتوث وبيانات) */
        .mini-conn-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4px;
            padding: 4px;
        }
        .mini-dot {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mini-dot.green { background: var(--ios-green); }
        .mini-dot.blue { background: var(--ios-blue); }
        .mini-dot.grey { background: rgba(255,255,255,0.15); }

        /* ================= المنطقة الوسطى (السلايدرات يمينها الأزرار) ================= */
        .cc-middle-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .sliders-subgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* السلايدرات الكبسولية فائقة المطاطية الحية */
        .jelly-slider-capsule {
            height: 156px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            will-change: transform;
        }

        .slider-fill {
            width: 100%;
            background: #ffffff;
            height: 50%;
            pointer-events: none;
            transition: height 0.1s ease-out;
        }

        .slider-icon-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 5;
        }

        /* القسم الأيمن من الوسط (الأزرار والتركيز) */
        .right-controls-subgrid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .top-two-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .circle-action-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        /* كبسولة التركيز العريضة المطابقة */
        .focus-capsule {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            will-change: transform;
        }

        /* ================= الصف السفلي الدائري للأدوات ================= */
        .cc-bottom-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 4px;
        }

        .bottom-tool-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            height: 68px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        /* الأيقونات النظيفة بالـ SVG */
        .icon-svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-filled {
            fill: #ffffff;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <!-- البار العلوي كأنه حقيقي -->
        <div class="status-bar">
            <span style="display:flex; align-items:center; gap:4px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 12.55a11 11 0 0 1 14.08 0"/></svg>
                <span>%١٠٠</span>
            </span>
            <div>١٢:٣٣</div>
        </div>
        <div class="dynamic-island"></div>

        <!-- اللوحة المتكاملة والمنظمة طبق الأصل لـ IMG_20260622_123332_2.jpg -->
        <div class="control-center-panel">
            
            <!-- الصف العلوي -->
            <div class="cc-row-top">
                <!-- يسار: كارت الموسيقى والميديا -->
                <div class="cc-card music-card jelly-drag-target">
                    <div class="music-top">
                        <svg class="icon-svg" viewBox="0 0 24 24" style="width:18px; height:18px;"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 1 0 10 10"/></svg>
                        <div></div>
                    </div>
                    <div class="music-status">متوقف</div>
                    <div class="music-controls">
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:#fff;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:#fff;"><path d="M8 5v14l11-7z"/></svg>
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:#fff;"><path d="M6 5v14l11-7z"/></svg>
                    </div>
                </div>

                <!-- يمين: كارت الاتصالات المطور آيفون 18 -->
                <div class="cc-card connectivity-grid jelly-drag-target">
                    <div class="conn-btn"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16v-2l-8.5-5V3.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5V9L2 14v2l8.5-2.5V19L8 20.5V22l4-1 4 1v-1.5L13.5 19v-5.5L22 16z"/></svg></div>
                    <div class="conn-btn active-blue"><svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3a9 9 0 0 1 9 9/M3 12a9 9 0 0 1 9-9"/></svg></div>
                    <div class="conn-btn active-blue"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0"/></svg></div>
                    <!-- المربع الصغير رباعي الأيقونات داخلياً -->
                    <div class="mini-conn-box">
                        <div class="mini-dot green"><svg viewBox="0 0 24 24" style="width:10px; height:10px; fill:#fff;"><path d="M2 22h20V2z"/></svg></div>
                        <div class="mini-dot blue"><svg viewBox="0 0 24 24" style="width:10px; height:10px; stroke:#fff; stroke-width:3; fill:none;"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg></div>
                        <div class="mini-dot grey"></div>
                        <div class="mini-dot grey"></div>
                    </div>
                </div>
            </div>

            <!-- المنطقة الوسطى الكبرى -->
            <div class="cc-middle-section">
                <!-- السلايدرات الطولية باليسار تماماً -->
                <div class="sliders-subgrid">
                    <!-- سلايدر الصوت -->
                    <div class="jelly-slider-capsule" data-type="volume">
                        <div class="slider-fill" style="height: 65%;"></div>
                        <div class="slider-icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24" style="stroke: #00bcd4;"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        </div>
                    </div>
                    <!-- سلايدر السطوع -->
                    <div class="jelly-slider-capsule" data-type="brightness">
                        <div class="slider-fill" style="height: 45%;"></div>
                        <div class="slider-icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24" style="stroke: #ffb300;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>
                        </div>
                    </div>
                </div>

                <!-- الأزرار والتركيز باليمين تماماً -->
                <div class="right-controls-subgrid">
                    <div class="top-two-buttons">
                        <div class="circle-action-btn jelly-drag-target">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </div>
                        <div class="circle-action-btn jelly-drag-target">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                        </div>
                    </div>
                    <!-- كبسولة التركيز العريضة -->
                    <div class="focus-capsule jelly-drag-target">
                        <svg class="icon-svg icon-filled" viewBox="0 0 24 24" style="width:18px; height:18px;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <span style="font-size:13px; font-weight:600;">التركيز</span>
                    </div>
                </div>
            </div>

            <!-- الصف السفلي للأدوات الدائرية الأربعة -->
            <div class="cc-bottom-row">
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="14" r="2"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 2H6v3l4 4v9a2 2 0 0 0 2 2 2 2 0 0 0 2-2v-9l4-4V2z"/></svg>
                </div>
            </div>

        </div>
    </div>

    <!-- جافاسكريبت متطور لهندسة السحب والتمطيط اللحظي (Interactive Jelly Drag Engine) -->
    <script>
        // أولاً: تفعيل ميزة امتطاط الكبسولات الطولية والتحكم بها أثناء السحب الفعلي
        document.querySelectorAll('.jelly-slider-capsule').forEach(slider => {
            let startY = 0;
            let startX = 0;
            let isDragging = false;

            slider.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startY = e.clientY;
                startX = e.clientX;
                slider.setPointerCapture(e.pointerId);
                updateSliderFill(e, slider);
            });

            slider.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                updateSliderFill(e, slider);

                // حساب مسافة حركة الإصبع لحظياً لعمل تشويه ومطاطية حية (Live Distortion)
                let deltaY = e.clientY - startY;
                let deltaX = e.clientX - startX;
                
                // تمطيط العنصر باتجاه السحب الفعلي لإعطاء إحساس الجلي السائل
                let scaleY = 1 + Math.abs(deltaY) * 0.0012;
                let scaleX = 1 - Math.abs(deltaX) * 0.0008;
                let skew = deltaX * 0.04; // ميلان خفيف مع السحب الجانبي للراحة النفسية

                slider.style.transform = `scale(${scaleX}, ${scaleY}) skewX(${skew}deg)`;
            });

            slider.addEventListener('pointerup', () => {
                isDragging = false;
                // ارتداد مرن رائع كأنها قطعة جلي تفلتها وترجع لمكانها المستقر
                slider.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.42, 1.45)';
                slider.style.transform = 'scale(1, 1) skewX(0deg)';
                setTimeout(() => { slider.style.transition = ''; }, 500);
            });
        });

        function updateSliderFill(e, slider) {
            const fill = slider.querySelector('.slider-fill');
            const rect = slider.getBoundingClientRect();
            let yPos = e.clientY - rect.top;
            let percent = 100 - (yPos / rect.height * 100);
            percent = Math.max(0, Math.min(100, percent));
            fill.style.height = percent + '%';
        }

        // ثانياً: هندسة التمطيط والسحب لجميع الكروت والأزرار الدائرية الأخرى (Jelly Drag Target)
        document.querySelectorAll('.jelly-drag-target').forEach(element => {
            let anchorY = 0;
            let anchorX = 0;
            let activeDrag = false;

            element.addEventListener('pointerdown', (e) => {
                activeDrag = true;
                anchorY = e.clientY;
                anchorX = e.clientX;
                element.setPointerCapture(e.pointerId);
                element.style.transition = 'none';
            });

            element.addEventListener('pointermove', (e) => {
                if (!activeDrag) return;
                let currentDeltaY = e.clientY - anchorY;
                let currentDeltaX = e.clientX - anchorX;

                // معادلة فيزيائية ناعمة جداً لامتطاط الكرت أو الزر بالكامل مع حركة إصبعك
                let dynamicScaleX = 1 + (currentDeltaX * 0.001);
                let dynamicScaleY = 1 + (currentDeltaY * 0.001);
                let moveX = currentDeltaX * 0.2; // إزاحة موضعية خفيفة تتبع إصبعك
                let moveY = currentDeltaY * 0.2;

                element.style.transform = `translate(${moveX}px, ${moveY}px) scale(${dynamicScaleX}, ${dynamicScaleY})`;
            });

            element.addEventListener('pointerup', () => {
                activeDrag = false;
                // تأثير الارتداد العكسي الفخم المتطابق مع حركة واجهات آبل السيالة
                element.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.42, 1.35)';
                element.style.transform = 'translate(0px, 0px) scale(1, 1)';
            });
        });
    </script>
</body>
</html>
