<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستطيل الزجاج السائل الاحترافي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #080415; }
        
        /* الخلفية السينمائية المتداخلة */
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(135deg, #090518, #140931, #2e083f, #4a0e3f, #0f2b3c);
            background-size: 400% 400%; animation: ultraGradient 20s ease infinite;
        }
        @keyframes ultraGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="jellyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('jellyCanvas');
        const ctx = canvas.getContext('2d');

        let dpr = window.devicePixelRatio || 1;
        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
            init();
        }
        window.addEventListener('resize', resize);

        // قيم فيزيائية مدروسة بدقة لمنع القلتشات والسرعة الزائدة
        const STIFFNESS = 0.09;      // صلابة ناعمة ومطاطية متزنة
        const DAMPING = 0.80;        // زيادة التخميد لامتصاص الرجفة والسرعة الزايدة
        const HOME_STIFFNESS = 0.035; // قوة جذب ناعمة للمركز تعطيك إحساس السائل الثقيل
        const MIN_DISTANCE = 50;     // مسافة الأمان لمنع التداخل
        const MAX_VELOCITY = 12;     // كبح السرعة القصوى للنقاط لمنع الطيران والقلتشات
        
        let particles = [], springs = [], dragged = null;
        let touchPos = { x: 0, y: 0, glowAlpha: 0, targetGlowAlpha: 0 };

        class Particle {
            constructor(x, y, homeX, homeY) {
                this.x = x; this.y = y;
                this.homeX = homeX; this.homeY = homeY;
                this.vx = 0; this.vy = 0;
                this.mass = 3.5; // وزن ثقيل ومستقر
            }
            update() {
                if (this === dragged) return;

                // الجذب نحو المركز الأصلي
                let hx = this.homeX - this.x;
                let hy = this.homeY - this.y;
                this.vx += hx * HOME_STIFFNESS;
                this.vy += hy * HOME_STIFFNESS;

                this.vx *= DAMPING; this.vy *= DAMPING;

                // كبح السرعة (Velocity Clamping) لمنع الحركات المفاجئة والقلتشات
                this.vx = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, this.vx));
                this.vy = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, this.vy));

                this.x += this.vx; this.y += this.vy;

                // حدود الشاشة الذكية
                const b = 40;
                if (this.x < b) { this.x = b; this.vx *= -0.1; }
                if (this.x > window.innerWidth - b) { this.x = window.innerWidth - b; this.vx *= -0.1; }
                if (this.y < b) { this.y = b; this.vy *= -0.1; }
                if (this.y > window.innerHeight - b) { this.y = window.innerHeight - b; this.vy *= -0.1; }
            }
        }

        class Spring {
            constructor(p1, p2, len) { this.p1 = p1; this.p2 = p2; this.len = len; }
            update() {
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy); if (dist === 0) return;
                let force = ((this.len - dist) / dist) * STIFFNESS;
                let fx = dx * force, fy = dy * force;
                if (this.p1 !== dragged) { this.p1.vx -= fx / this.p1.mass; this.p1.vy -= fy / this.p1.mass; }
                if (this.p2 !== dragged) { this.p2.vx += fx / this.p2.mass; this.p2.vy += fy / this.p2.mass; }
            }
        }

        function init() {
            particles = []; springs = [];
            let w = 260, h = 160; 
            let cx = window.innerWidth / 2, cy = window.innerHeight / 2;

            // بناء 8 نقاط محيطية متناسقة هندسياً
            let pts = [
                {x: cx - w/2, y: cy - h/2}, {x: cx, y: cy - h/2}, {x: cx + w/2, y: cy - h/2},
                {x: cx + w/2, y: cy},
                {x: cx + w/2, y: cy + h/2}, {x: cx, y: cy + h/2}, {x: cx - w/2, y: cy + h/2},
                {x: cx - w/2, y: cy}
            ];
            pts.forEach(p => particles.push(new Particle(p.x, p.y, p.x, p.y)));

            // ربط شبكي متقاطع كامل لثبات الهيكل ومنع الانبعاج والقلتشات
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    springs.push(new Spring(particles[i], particles[j], dist));
                }
            }
        }

        function resolveCollisions() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[j].x - particles[i].x;
                    let dy = particles[j].y - particles[i].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MIN_DISTANCE) {
                        let overlap = MIN_DISTANCE - dist;
                        let nx = dx / dist; let ny = dy / dist;
                        if (particles[i] !== dragged) { particles[i].x -= nx * overlap * 0.5; particles[i].y -= ny * overlap * 0.5; }
                        if (particles[j] !== dragged) { particles[j].x += nx * overlap * 0.5; particles[j].y += ny * overlap * 0.5; }
                    }
                }
            }
        }

        resize();

        function getMousePos(e) {
            let t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }
        
        window.addEventListener('mousedown', (e) => start(getMousePos(e).x, getMousePos(e).y));
        window.addEventListener('mousemove', (e) => move(getMousePos(e).x, getMousePos(e).y));
        window.addEventListener('mouseup', () => end());
        window.addEventListener('touchstart', (e) => start(getMousePos(e).x, getMousePos(e).y), { passive: true });
        window.addEventListener('touchmove', (e) => move(getMousePos(e).x, getMousePos(e).y), { passive: true });
        window.addEventListener('touchend', () => end());

        function start(mx, my) {
            let close = null, minDist = 90;
            particles.forEach(p => { let d = Math.hypot(p.x - mx, p.y - my); if (d < minDist) { minDist = d; close = p; } });
            dragged = close;

            if (dragged) {
                touchPos.x = mx; touchPos.y = my;
                touchPos.targetGlowAlpha = 0.65; // تفعيل التوهج بنعومة
            }
        }

        function move(mx, my) { 
            if (dragged) { 
                dragged.x = mx; dragged.y = my; 
                dragged.vx = 0; dragged.vy = 0; 
                touchPos.x = mx; touchPos.y = my;
            } 
        }

        function end() { dragged = null; touchPos.targetGlowAlpha = 0; }

        function loop() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            
            // توزيع مريح وعميق لحسابات الفيزياء لمنع أي تقطيع (Sub-stepping)
            for (let k = 0; k < 5; k++) {
                springs.forEach(s => s.update());
                resolveCollisions();
            }
            particles.forEach(p => p.update());

            // حساب السنتر التفاعلي للمستطيل
            let avgX = 0, avgY = 0;
            particles.forEach(p => { avgX += p.x; avgY += p.y; });
            avgX /= particles.length; avgY /= particles.length;

            // رسم المستطيل بمنحنيات بيزيه انسيابية ومحترفة
            ctx.beginPath();
            let startX = (particles[particles.length - 1].x + particles[0].x) / 2;
            let startY = (particles[particles.length - 1].y + particles[0].y) / 2;
            ctx.moveTo(startX, startY);

            for (let i = 0; i < particles.length; i++) {
                let current = particles[i];
                let next = particles[(i + 1) % particles.length];
                let xc = (current.x + next.x) / 2;
                let yc = (current.y + next.y) / 2;
                ctx.quadraticCurveTo(current.x, current.y, xc, yc);
            }
            ctx.closePath();

            // خامة الزجاج السائل الواضحة والفخمة
            let dxCenter = avgX - (window.innerWidth / 2);
            let dyCenter = avgY - (window.innerHeight / 2);
            let gradX1 = avgX - dxCenter * 0.3;
            let gradY1 = (avgY - 70) - dyCenter * 0.3;
            
            let glassGrad = ctx.createLinearGradient(gradX1, gradY1, avgX, avgY + 90);
            glassGrad.addColorStop(0, "rgba(255, 255, 255, 0.30)"); 
            glassGrad.addColorStop(0.5, "rgba(255, 255, 255, 0.14)"); 
            glassGrad.addColorStop(1, "rgba(255, 255, 255, 0.04)");
            
            ctx.shadowColor = "rgba(255, 255, 255, 0.12)";
            ctx.shadowBlur = 30;
            ctx.fillStyle = glassGrad;
            ctx.fill();
            ctx.shadowBlur = 0;

            // تنعيم ظهور واختفاء التوهج (Linear Interpolation) لمنع القفزات البصرية
            touchPos.glowAlpha += (touchPos.targetGlowAlpha - touchPos.glowAlpha) * 0.1;

            // رسم التوهج تحت أصبع المستخدم باحترافية
            if (touchPos.glowAlpha > 0.01) {
                ctx.save();
                ctx.clip(); // حصر التوهج داخل جسم المستطيل
                let touchGlow = ctx.createRadialGradient(touchPos.x, touchPos.y, 5, touchPos.x, touchPos.y, 70);
                touchGlow.addColorStop(0, `rgba(255, 255, 255, ${touchPos.glowAlpha})`);
                touchGlow.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = touchGlow;
                ctx.fillRect(avgX - 400, avgY - 400, 800, 800);
                ctx.restore();
            }

            // التحديد الخارجي الواضح والبارز وبأعلى دقة ونعومة
            ctx.lineJoin = "round";
            ctx.lineWidth = 4.5;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.78)";
            ctx.stroke();

            // لمعة الحافة الداخلية الرفيعة
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.38)";
            ctx.stroke();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
