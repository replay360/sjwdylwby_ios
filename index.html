<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع التصاميم الرياضية الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b0b0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 420px;
        }

        /* حاوية التصميم الثابتة بأبعاد 400x500 لمنع أي تشويه */
        .design-template {
            width: 400px;
            height: 500px;
            min-width: 400px;
            min-height: 500px;
            position: relative;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* حاوية الصورة الأساسية للاعب */
        .image-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        .user-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transition: filter 0.2s ease;
        }

        /* الفلاتر السريعة المستقرة */
        .f-hd { filter: contrast(1.25) brightness(1.05) saturate(1.1); }
        .f-smooth { filter: brightness(1.08) contrast(0.95) saturate(1.05) blur(0.3px); }
        .f-contrast { filter: contrast(1.35) saturate(1.25); }
        .f-cinematic { filter: contrast(1.15) saturate(0.65) hue-rotate(-5deg); }
        .f-warm { filter: sepia(0.2) contrast(1.15) saturate(1.1); }

        /* الظل السفلي الكلاسيكي للقوالب */
        .bottom-smooth-shadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
            z-index: 2;
        }

        /* الحقوق النصية الاحترافية */
        .rights-text {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            display: flex;
            gap: 5px;
            direction: ltr;
        }

        /* منطقة النصوص العامة */
        .text-wrap {
            position: absolute;
            bottom: 25px;
            width: 100%;
            z-index: 6;
            text-align: center;
            padding: 0 25px;
            box-sizing: border-box;
            transition: bottom 0.3s ease;
        }

        .text-main {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .text-sub {
            font-size: 22px;
            font-weight: 900;
            color: #cc2027;
            margin: 10px 0 0 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .alarm-icon {
            display: none;
            width: 44px;
            height: 44px;
            background: linear-gradient(to bottom, #ff2a35, #cc2027);
            border-radius: 12px;
            margin: 0 auto 14px auto;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(204,32,39,0.5);
            border: 1px solid #b01a1f;
        }

        /* ------------------ تفاصيل القوالب ------------------ */

        /* القالب الأول */
        .tmpl-first .glow-background {
            position: absolute;
            bottom: -30px;
            width: 100%;
            height: 180px;
            z-index: 3;
            background: radial-gradient(circle, rgba(204,32,39,0.25) 0%, rgba(0,77,152,0.2) 50%, transparent 80%);
            filter: blur(15px);
        }
        .tmpl-first .text-sub { color: #ff4a4a; }

        /* القالب الثاني */
        .tmpl-second { border-radius: 0 0 45px 45px; }
        .tmpl-second .laporta-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 15, 52, 0.98) 0%, rgba(16, 26, 82, 0.85) 50%, transparent 100%);
            z-index: 3;
        }
        .tmpl-second .laporta-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 8px;
            display: flex;
            z-index: 4;
        }
        .tmpl-second .laporta-bar .b-red { flex: 1; background: #cc2027; }
        .tmpl-second .laporta-bar .b-blue { flex: 1; background: #004d98; }
        .tmpl-second .text-wrap { bottom: 35px; }
        .tmpl-second .text-sub { color: #ff3b3b; }

        /* القالب الثالث */
        .tmpl-third .rodri-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 44px;
            background: linear-gradient(to top, #050507 80%, rgba(5,5,7,0.2) 100%);
            z-index: 4;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .tmpl-third .rodri-subbar-left {
            width: 120px;
            height: 10px;
            background: #004d98;
            transform: skewX(-35deg);
            margin-left: -20px;
            margin-bottom: 5px;
        }
        .tmpl-third .rodri-subbar-right {
            width: 120px;
            height: 10px;
            background: #cc2027;
            transform: skewX(35deg);
            margin-right: -20px;
            margin-bottom: 5px;
        }
        .tmpl-third .alarm-icon { display: flex; }
        .tmpl-third .text-wrap { bottom: 60px; }
        .tmpl-third .text-sub { color: #cc2027; }

        /* القالب الرابع */
        .tmpl-fourth .side-glow-left {
            position: absolute;
            top: 0; left: 0; width: 6px; height: 100%;
            background: #004d98; z-index: 4;
            box-shadow: 4px 0 20px rgba(0, 77, 152, 0.8);
        }
        .tmpl-fourth .side-glow-right {
            position: absolute;
            top: 0; right: 0; width: 6px; height: 100%;
            background: #cc2027; z-index: 4;
            box-shadow: -4px 0 20px rgba(204, 32, 39, 0.8);
        }
        .tmpl-fourth .text-sub { color: #ff5252; }

        /* القالب الخامس */
        .tmpl-fifth .bottom-smooth-shadow { display: none; }
        .tmpl-fifth .kane-ambient {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(74,20,140,0.85) 0%, rgba(26,35,126,0.5) 60%, transparent 100%);
            z-index: 2;
        }
        .tmpl-fifth .text-wrap { bottom: 35px; padding: 0 15px; }
        .tmpl-fifth .text-main {
            display: inline-block;
            background-color: #b71c1c;
            color: #fff;
            padding: 4px 16px;
            font-size: 22px;
            text-shadow: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        .tmpl-fifth .text-sub {
            color: #fff;
            font-size: 24px;
            background: none;
            padding: 0;
            text-shadow: 0 2px 8px rgba(0,0,0,1);
        }

        /* القالب السادس */
        .tmpl-sixth .bottom-smooth-shadow { display: none; }
        .tmpl-sixth .casado-gradient {
            position: absolute;
            bottom: 0; width: 100%; height: 45%;
            background: linear-gradient(to top, #4a148c 0%, #7b1fa2 40%, transparent 100%);
            opacity: 0.9;
            z-index: 2;
        }
        .tmpl-sixth .text-wrap { bottom: 30px; }
        .tmpl-sixth .text-main {
            color: #fff;
            font-size: 24px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            background: rgba(74, 20, 140, 0.6);
            display: inline-block;
            padding: 2px 12px;
            border-radius: 4px;
        }
        .tmpl-sixth .text-sub {
            color: #fff;
            font-size: 22px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            margin-top: 6px;
        }

        /* أزرار لوحة التحكم بالتسميات الجديدة السلسة */
        .template-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
        }

        .selector-btn {
            background: #141419;
            border: 2px solid #2f2f3a;
            color: #fff;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
            text-align: center;
        }

        .selector-btn.active {
            border-color: #cc2027;
            background: #cc2027;
        }

        .controls {
            background: #141419;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            border: 1px solid #23232a;
            box-sizing: border-box;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }

        .control-group input[type="text"], 
        .control-group input[type="file"],
        .control-group input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2f2f3a;
            background: #1a1a22;
            color: #fff;
            box-sizing: border-box;
        }

        .filter-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            min-width: 75px;
            background: #1a1a22;
            border: 1px solid #2f2f3a;
            color: #ccc;
            padding: 8px 2px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: #cc2027;
            background: #23232f;
            color: #fff;
        }

        button.download-btn {
            width: 100%;
            padding: 12px;
            background: #cc2027;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        button.download-btn:hover {
            background: #a1161b;
        }
    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="design-template tmpl-first" id="templateContainer">
            
            <!-- تم حذف كود اللوغو التجريبي المكسور من هنا نهائياً -->

            <!-- الحقوق النصية -->
            <div class="rights-text">
                <span>AL HASSANI</span>
                <span>|</span>
                <span>الحساني</span>
            </div>

            <!-- عناصر القوالب الجمالية -->
            <div class="glow-background" id="firstGlow"></div>
            
            <div class="laporta-glow" id="lpGlow" style="display:none;"></div>
            <div class="laporta-bar" id="lpBar" style="display:none;">
                <div class="b-red"></div>
                <div class="b-blue"></div>
            </div>

            <div class="rodri-bar" id="rdBar" style="display:none;">
                <div class="rodri-subbar-left"></div>
                <div class="rodri-subbar-right"></div>
            </div>

            <div class="side-glow-left" id="sideLeft" style="display:none;"></div>
            <div class="side-glow-right" id="sideRight" style="display:none;"></div>
            
            <!-- طبقات الخلفيات للقوالب الجديدة المأخوذة من صورك -->
            <div class="kane-ambient" id="kaneAmbient" style="display:none;"></div>
            <div class="casado-gradient" id="casadoGradient" style="display:none;"></div>

            <!-- حاوية صورة اللاعب -->
            <div class="image-container">
                <img src="" id="playerImg" class="user-image" style="display: none;">
            </div>

            <div class="bottom-smooth-shadow" id="baseShadow"></div>
            
            <!-- منطقة النصوص الموزعة -->
            <div class="text-wrap">
                <div class="alarm-icon" id="alarmIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                </div>
                <h1 class="text-main" id="textMain">بيدري رودري</h1>
                <h2 class="text-sub" id="textSub">خارج الحسابات</h2>
            </div>
        </div>

        <!-- أسماء الأزرار الجديدة المتسلسلة والمبسطة مالتك -->
        <div class="template-selector">
            <button class="selector-btn active" onclick="changeStyle('first', this)">القالب الأول</button>
            <button class="selector-btn" onclick="changeStyle('second', this)">القالب الثاني</button>
            <button class="selector-btn" onclick="changeStyle('third', this)">القالب الثالث</button>
            <button class="selector-btn" onclick="changeStyle('fourth', this)">القالب الرابع</button>
            <button class="selector-btn" onclick="changeStyle('fifth', this)">القالب الخامس</button>
            <button class="selector-btn" onclick="changeStyle('sixth', this)">القالب السادس</button>
        </div>

        <!-- لوحة التحكم -->
        <div class="controls">
            <div class="control-group">
                <label>صورة اللاعب:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            
            <div class="control-group">
                <label>الفلاتر الاحترافية:</label>
                <div class="filter-container">
                    <button class="filter-btn active" onclick="applyFilter('none', this)">بدون فلتر</button>
                    <button class="filter-btn" onclick="applyFilter('f-hd', this)">فلتر HD</button>
                    <button class="filter-btn" onclick="applyFilter('f-smooth', this)">نعومة AI</button>
                    <button class="filter-btn" onclick="applyFilter('f-contrast', this)">تباين عالٍ</button>
                    <button class="filter-btn" onclick="applyFilter('f-cinematic', this)">سينمائي</button>
                    <button class="filter-btn" onclick="applyFilter('f-warm', this)">دافئ</button>
                </div>
            </div>

            <div class="control-group">
                <label>الحجم (تكبير / تصغير):</label>
                <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1">
            </div>
            <div class="control-group">
                <label>الموقع العمودي (فوق / تحت):</label>
                <input type="range" id="ySlider" min="-300" max="300" step="1" value="0">
            </div>
            <div class="control-group">
                <label>العنوان الرئيسي:</label>
                <input type="text" id="textMainInput" value="بيدري رودري">
            </div>
            <div class="control-group">
                <label>العنوان الفرعي:</label>
                <input type="text" id="textSubInput" value="خارج الحسابات">
            </div>
            <button class="download-btn" id="downloadBtn">تحميل التصميم النهائي</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const imageInput = document.getElementById('imageInput');
        const playerImg = document.getElementById('playerImg');
        const textMainInput = document.getElementById('textMainInput');
        const textSubInput = document.getElementById('textSubInput');
        const textMain = document.getElementById('textMain');
        const textSub = document.getElementById('textSub');
        const downloadBtn = document.getElementById('downloadBtn');
        const templateContainer = document.getElementById('templateContainer');
        
        const firstGlow = document.getElementById('firstGlow');
        const lpGlow = document.getElementById('lpGlow'); const lpBar = document.getElementById('lpBar');
        const rdBar = document.getElementById('rdBar'); const alarmIcon = document.getElementById('alarmIcon');
        const sideLeft = document.getElementById('sideLeft'); const sideRight = document.getElementById('sideRight');
        const kaneAmbient = document.getElementById('kaneAmbient'); const casadoGradient = document.getElementById('casadoGradient');
        const baseShadow = document.getElementById('baseShadow');

        const scaleSlider = document.getElementById('scaleSlider');
        const ySlider = document.getElementById('ySlider');

        let currentScale = 1;
        let currentY = 0;

        const templateTexts = {
            first: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            second: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            third: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            fourth: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            fifth: { main: 'هاري كين', sub: 'إلى برشلونة؟' },
            sixth: { main: 'أتلتيكو يطرق باب كاسادو', sub: 'وبرشلونة ينتظر القرار !!' }
        };

        function updateImageTransform() {
            playerImg.style.transform = `scale(${currentScale}) translateY(${currentY}px)`;
        }

        scaleSlider.addEventListener('input', (e) => { currentScale = e.target.value; updateImageTransform(); });
        ySlider.addEventListener('input', (e) => { currentY = e.target.value; updateImageTransform(); });

        textMainInput.addEventListener('input', () => {
            textMain.innerText = textMainInput.value;
            const currentStyle = getActiveStyleName();
            templateTexts[currentStyle].main = textMainInput.value;
        });
        
        textSubInput.addEventListener('input', () => {
            textSub.innerText = textSubInput.value;
            const currentStyle = getActiveStyleName();
            templateTexts[currentStyle].sub = textSubInput.value;
        });

        function getActiveStyleName() {
            if(templateContainer.classList.contains('tmpl-first')) return 'first';
            if(templateContainer.classList.contains('tmpl-second')) return 'second';
            if(templateContainer.classList.contains('tmpl-third')) return 'third';
            if(templateContainer.classList.contains('tmpl-fourth')) return 'fourth';
            if(templateContainer.classList.contains('tmpl-fifth')) return 'fifth';
            if(templateContainer.classList.contains('tmpl-sixth')) return 'sixth';
            return 'first';
        }

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    playerImg.src = e.target.result;
                    playerImg.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        function applyFilter(filterClass, btnElement) {
            playerImg.classList.remove('f-hd', 'f-smooth', 'f-contrast', 'f-cinematic', 'f-warm');
            if(filterClass !== 'none') {
                playerImg.classList.add(filterClass);
            }
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function changeStyle(styleName, btnElement) {
            templateContainer.classList.remove('tmpl-first', 'tmpl-second', 'tmpl-third', 'tmpl-fourth', 'tmpl-fifth', 'tmpl-sixth');
            
            firstGlow.style.display = 'none'; lpGlow.style.display = 'none'; lpBar.style.display = 'none';
            rdBar.style.display = 'none'; alarmIcon.style.display = 'none';
            sideLeft.style.display = 'none'; sideRight.style.display = 'none';
            kaneAmbient.style.display = 'none'; casadoGradient.style.display = 'none';
            baseShadow.style.display = 'block'; 

            textMainInput.value = templateTexts[styleName].main;
            textSubInput.value = templateTexts[styleName].sub;
            textMain.innerText = templateTexts[styleName].main;
            textSub.innerText = templateTexts[styleName].sub;

            templateContainer.classList.add('tmpl-' + styleName);

            if (styleName === 'first') { firstGlow.style.display = 'block'; }
            else if (styleName === 'second') { lpGlow.style.display = 'block'; lpBar.style.display = 'flex'; }
            else if (styleName === 'third') { rdBar.style.display = 'flex'; alarmIcon.style.display = 'flex'; }
            else if (styleName === 'fourth') { sideLeft.style.display = 'block'; sideRight.style.display = 'block'; }
            else if (styleName === 'fifth') { kaneAmbient.style.display = 'block'; baseShadow.style.display = 'none'; }
            else if (styleName === 'sixth') { casadoGradient.style.display = 'block'; baseShadow.style.display = 'none'; }

            document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        downloadBtn.addEventListener('click', () => {
            html2canvas(templateContainer, {
                useCORS: true,
                scale: 3, 
                width: 400,
                height: 500,
                scrollX: 0,
                scrollY: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Al-Hassani-Design.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

</body>
</html>
