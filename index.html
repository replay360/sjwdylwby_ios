<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 18 Ultimate Control Center - Heavy Elastic</title>
    <style>
        :root {
            --ios-blur: blur(40px);
            --card-blur: blur(25px);
            --card-bg: rgba(35, 35, 40, 0.45);
            --card-border: rgba(255, 255, 255, 0.09);
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-orange: #ff9500;
            --ios-grey: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* حاوية الهاتف الثابتة */
        .phone-frame {
            position: relative;
            width: 393px;
            height: 852px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=393&auto=format&fit=crop') center/cover no-repeat;
            border: 12px solid #e3e3e3;
            border-radius: 55px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
            overflow: hidden;
        }

        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000000;
            border-radius: 20px;
            z-index: 1010;
        }

        .status-bar {
            position: absolute;
            top: 16px;
            width: 100%;
            padding: 0 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            z-index: 1009;
        }

        /* ================= الشاشة الرئيسية مع أيقونات التطبيقات الحقيقية ================= */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 85px 24px 40px 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 22px;
            z-index: 10;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .phone-frame.panel-open .home-screen {
            transform: scale(0.94);
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .app-box {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-label {
            font-size: 11px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            color: #ffffff;
        }

        /* منطقة سحب مركز التحكم من أعلى اليمين */
        .drag-zone-top {
            position: absolute;
            top: 0;
            right: 0;
            width: 160px;
            height: 65px;
            z-index: 1005;
            cursor: ns-resize;
        }

        /* ================= لوحة مركز التحكم المتطورة وضبابية الخلفية الحية ================= */
        .control-center-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 75px 16px 20px 16px;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
            transform: translateY(-100%);
            pointer-events: none;
            will-change: transform, background, backdrop-filter;
        }

        .phone-frame.panel-open .control-center-panel {
            pointer-events: auto;
        }

        .cc-row-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ميزة الضبابية المنعزلة الفخمة لكل كارت لمنع الشفافية العادية عند التراكب */
        .cc-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            height: 156px;
            padding: 14px;
            position: relative;
            z-index: 20;
            will-change: transform, height;
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        /* كارت الموسيقى المكدس القابل للتوسع */
        .music-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            overflow: hidden;
        }
        .music-card.expanded {
            position: absolute;
            left: 16px;
            right: 16px;
            width: calc(100% - 32px);
            height: 240px;
            z-index: 99;
        }
        .music-top { display: flex; justify-content: space-between; width: 100%; }
        .music-status { text-align: center; font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500; margin-top: 10px; }
        .music-controls { display: flex; justify-content: center; align-items: center; gap: 24px; margin-bottom: 8px; }

        /* كارت الاتصالات */
        .connectivity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: 100%;
        }

        .conn-btn {
            background: var(--ios-grey);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .conn-btn.active-blue { background: var(--ios-blue); }
        .conn-btn.active-orange { background: var(--ios-orange); }

        /* التفاعل البصري عند تفعيل أي خيار (نبضة مطاطية ناعمة) */
        .conn-btn:active { transform: scale(0.9); }
        
        .mini-conn-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4px;
            padding: 4px;
        }
        .mini-dot { border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .mini-dot.green { background: var(--ios-green); }
        .mini-dot.blue { background: var(--ios-blue); }
        .mini-dot.grey { background: rgba(255,255,255,0.15); }

        .cc-middle-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .sliders-subgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* السلايدرات مع طبقة ضبابية منعزلة ثقيلة */
        .jelly-slider-capsule {
            height: 156px;
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 20;
            will-change: transform;
        }

        .slider-fill {
            width: 100%;
            background: #ffffff;
            height: 50%;
            pointer-events: none;
        }

        .slider-icon-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 25;
        }

        .right-controls-subgrid { display: flex; flex-direction: column; gap: 14px; }
        .top-two-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .circle-action-btn {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            will-change: transform;
            cursor: pointer;
        }

        .focus-capsule {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            z-index: 20;
            will-change: transform;
            cursor: pointer;
        }

        .cc-bottom-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 4px; }

        .bottom-tool-btn {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--card-border);
            height: 68px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            will-change: transform;
            cursor: pointer;
        }

        .icon-svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-filled { fill: #ffffff; }

        .bottom-close-line {
            width: 46px; height: 5px; background-color: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 12px; left: 50%;
            transform: translateX(-50%); cursor: pointer; z-index: 1001;
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="phoneContainer">
        <div class="status-bar">
            <span style="display:flex; align-items:center; gap:4px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 12.55a11 11 0 0 1 14.08 0"/></svg>
                <span>%١٠٠</span>
            </span>
            <div>١٢:٣٣</div>
        </div>
        <div class="dynamic-island"></div>

        <div class="drag-zone-top" id="dragZone"></div>

        <div class="home-screen">
            <div class="app-icon"><div class="app-box" style="background: linear-gradient(135deg, #007aff, #0051a8);"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="app-label">الرسائل</div></div>
            <div class="app-icon"><div class="app-box" style="background: linear-gradient(135deg, #34c759, #119e2e);"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div><div class="app-label">الهاتف</div></div>
            <div class="app-icon"><div class="app-box" style="background: linear-gradient(135deg, #ff9500, #ff5e00);"><svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10zM2 12h20"/></svg></div><div class="app-label">سفاري</div></div>
            <div class="app-icon"><div class="app-box" style="background: linear-gradient(135deg, #af52de, #7a1fa2);"><svg class="icon-svg" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="app-label">المطور</div></div>
        </div>

        <div class="control-center-panel" id="ccPanel">
            
            <div class="cc-row-top">
                <div class="cc-card music-card jelly-drag-target" id="musicFolder">
                    <div class="music-top">
                        <svg class="icon-svg" viewBox="0 0 24 24" style="width:18px; height:18px; stroke:#ff2d55;"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 1 0 10 10"/></svg>
                        <span style="font-size:10px; color:#ff2d55; font-weight:700;">LIVE</span>
                    </div>
                    <div class="music-status">مشغل الموسيقى</div>
                    <div class="music-controls">
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:#fff;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:#fff;"><path d="M8 5v14l11-7z"/></svg>
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:#fff;"><path d="M6 5v14l11-7z"/></svg>
                    </div>
                </div>

                <div class="cc-card connectivity-grid jelly-drag-target">
                    <div class="conn-btn" onclick="triggerToggleNode(this, 'active-orange')"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16v-2l-8.5-5V3.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5V9L2 14v2l8.5-2.5V19L8 20.5V22l4-1 4 1v-1.5L13.5 19v-5.5L22 16z"/></svg></div>
                    <div class="conn-btn active-blue" onclick="triggerToggleNode(this, 'active-blue')"><svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3a9 9 0 0 1 9 9/M3 12a9 9 0 0 1 9-9"/></svg></div>
                    <div class="conn-btn active-blue" onclick="triggerToggleNode(this, 'active-blue')"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0"/></svg></div>
                    <div class="mini-conn-box">
                        <div class="mini-dot green"><svg viewBox="0 0 24 24" style="width:10px; height:10px; fill:#fff;"><path d="M2 22h20V2z"/></svg></div>
                        <div class="mini-dot blue"><svg viewBox="0 0 24 24" style="width:10px; height:10px; stroke:#fff; stroke-width:3; fill:none;"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg></div>
                        <div class="mini-dot grey"></div>
                        <div class="mini-dot grey"></div>
                    </div>
                </div>
            </div>

            <div class="cc-middle-section">
                <div class="sliders-subgrid">
                    <div class="jelly-slider-capsule" data-type="volume">
                        <div class="slider-fill" style="height: 65%;"></div>
                        <div class="slider-icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24" style="stroke: #00bcd4;"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        </div>
                    </div>
                    <div class="jelly-slider-capsule" data-type="brightness">
                        <div class="slider-fill" style="height: 45%;"></div>
                        <div class="slider-icon-box">
                            <svg class="icon-svg" viewBox="0 0 24 24" style="stroke: #ffb300;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>
                        </div>
                    </div>
                </div>

                <div class="right-controls-subgrid">
                    <div class="top-two-buttons">
                        <div class="circle-action-btn jelly-drag-target" onclick="triggerToggleNode(this, 'active-blue')">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </div>
                        <div class="circle-action-btn jelly-drag-target" onclick="triggerToggleNode(this, 'active-blue')">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                        </div>
                    </div>
                    <div class="focus-capsule jelly-drag-target">
                        <svg class="icon-svg icon-filled" viewBox="0 0 24 24" style="width:18px; height:18px; stroke:#5856d6; fill:#5856d6;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <span style="font-size:13px; font-weight:600;">التركيز</span>
                    </div>
                </div>
            </div>

            <div class="cc-bottom-row">
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="14" r="2"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/></svg>
                </div>
                <div class="bottom-tool-btn jelly-drag-target">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 2H6v3l4 4v9a2 2 0 0 0 2 2 2 2 0 0 0 2-2v-9l4-4V2z"/></svg>
                </div>
            </div>

            <div class="bottom-close-line" id="closeHandle"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('phoneContainer');
        const ccPanel = document.getElementById('ccPanel');
        const dragZone = document.getElementById('dragZone');
        const closeHandle = document.getElementById('closeHandle');
        const musicFolder = document.getElementById('musicFolder');

        let isDraggingCC = false;
        let startYCC = 0;

        // 1. أنيميشن سحب ونزول القائمة الفعلي لايف بالإصبع مع الضبابية المتدرجة
        dragZone.addEventListener('pointerdown', (e) => {
            isDraggingCC = true;
            startYCC = e.clientY;
            ccPanel.style.transition = 'none';
            dragZone.setPointerCapture(e.pointerId);
        });

        dragZone.addEventListener('pointermove', (e) => {
            if (!isDraggingCC) return;
            let currentMoveY = e.clientY - startYCC;
            if (currentMoveY >= 0 && currentMoveY <= 852) {
                let progress = currentMoveY / 852;
                ccPanel.style.transform = `translateY(${-852 + currentMoveY}px)`;
                ccPanel.style.background = `rgba(0, 0, 0, ${progress * 0.55})`;
                ccPanel.style.backdropFilter = `blur(${progress * 40}px)`;
                ccPanel.style.webkitBackdropFilter = `blur(${progress * 40}px)`;
            }
        });

        dragZone.addEventListener('pointerup', (e) => {
            if (!isDraggingCC) return;
            isDraggingCC = false;
            let finalMoveY = e.clientY - startYCC;
            if (finalMoveY > 100) {
                container.classList.add('panel-open');
                // ارتداد ثقيل واحترافي مستقر جداً
                ccPanel.style.transition = 'transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), background 0.5s, backdrop-filter 0.5s';
                ccPanel.style.transform = 'translateY(0)';
                ccPanel.style.background = 'rgba(0, 0, 0, 0.55)';
                ccPanel.style.backdropFilter = 'var(--ios-blur)';
                ccPanel.style.webkitBackdropFilter = 'var(--ios-blur)';
            } else {
                closeCC();
            }
        });

        closeHandle.addEventListener('click', () => { closeCC(); });
        function closeCC() {
            container.classList.remove('panel-open');
            ccPanel.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            ccPanel.style.transform = 'translateY(-100%)';
            if(musicFolder.classList.contains('expanded')) musicFolder.classList.remove('expanded');
        }

        // 2. ميزة فتح وتوسيع القائمة المكدسة (الموسيقى) عند الضغط
        musicFolder.addEventListener('click', (e) => {
            if (e.target.closest('.music-controls') || isDraggingCC) return;
            musicFolder.classList.toggle('expanded');
        });

        // 3. التفاعل النبضي المرن عند تفعيل الأزرار
        function triggerToggleNode(btn, className) {
            btn.classList.toggle(className);
            btn.style.transform = 'scale(0.85)';
            setTimeout(() => {
                btn.style.transition = 'transform 0.5s cubic-bezier(0.25, 1.5, 0.4, 1)';
                btn.style.transform = 'scale(1.08)';
                setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 150);
            }, 80);
        }

        // 4. السلايدرات الطولية مع وزن مطاطي أثقل وأكثر استقراراً عند الرجوع
        document.querySelectorAll('.jelly-slider-capsule').forEach(slider => {
            let sY = 0, sX = 0, active = false;

            slider.addEventListener('pointerdown', (e) => {
                active = true;
                sY = e.clientY; sX = e.clientX;
                slider.setPointerCapture(e.pointerId);
                slider.style.transition = 'none';
                updateFill(e, slider);
            });

            slider.addEventListener('pointermove', (e) => {
                if (!active) return;
                updateFill(e, slider);
                let dY = e.clientY - sY;
                let dX = e.clientX - sX;

                // قفل الوزن المطاطي ليكون أثقل وأكثر فخامة
                let scaleY = 1 + Math.min(Math.abs(dY) * 0.0004, 0.05);
                let scaleX = 1 - Math.min(Math.abs(dX) * 0.0003, 0.03);
                slider.style.transform = `scale(${scaleX}, ${scaleY})`;
            });

            slider.addEventListener('pointerup', () => {
                active = false;
                // إخماد حركي ناعم يمنع الرجفة تماماً لراحة نفسية أعمق
                slider.style.transition = 'transform 0.65s cubic-bezier(0.16, 1, 0.3, 1)';
                slider.style.transform = 'scale(1, 1)';
            });
        });

        function updateFill(e, slider) {
            const fill = slider.querySelector('.slider-fill');
            const rect = slider.getBoundingClientRect();
            let p = 100 - ((e.clientY - rect.top) / rect.height * 100);
            fill.style.height = Math.max(0, Math.min(100, p)) + '%';
        }

        // 5. السحب والضبابية المنعزلة الفخمة لباقي الأزرار والكروت الثقيلة
        document.querySelectorAll('.jelly-drag-target').forEach(el => {
            let aY = 0, aX = 0, drag = false;

            el.addEventListener('pointerdown', (e) => {
                if(el.classList.contains('expanded')) return;
                drag = true;
                aY = e.clientY; aX = e.clientX;
                el.setPointerCapture(e.pointerId);
                el.style.transition = 'none';
                el.style.zIndex = '50';
            });

            el.addEventListener('pointermove', (e) => {
                if (!drag) return;
                let dY = e.clientY - aY;
                let dX = e.clientX - aX;

                let sX = 1 + (dX * 0.0004);
                let sY = 1 + (dY * 0.0004);
                let mX = dX * 0.15; // حركة رزيانة وثقيلة تتبع الإصبع
                let mY = dY * 0.15;

                el.style.transform = `translate(${mX}px, ${mY}px) scale(${sX}, ${sY})`;
            });

            el.addEventListener('pointerup', () => {
                if (!drag) return;
                drag = false;
                // ارتداد مخمد رصين جداً
                el.style.transition = 'transform 0.7s cubic-bezier(0.16, 1, 0.3, 1)';
                el.style.transform = 'translate(0px, 0px) scale(1, 1)';
                setTimeout(() => { if(!el.classList.contains('expanded')) el.style.zIndex = '20'; }, 700);
            });
        });
    </script>
</body>
</html>
