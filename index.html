<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Light Bulb - Bear Toggle</title>
    <style>
        :root {
            --bg-color: #f3dfb6;
            --door-color: #a18e78;
            --door-dark: #8b7762;
            --bear-fur: #784421;
            --bear-pad: #deaa87;
            --cord-color: #222;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a2632;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* حاوية المشهد الأساسي */
        .scene {
            position: relative;
            width: 500px;
            height: 350px;
            background-color: var(--bg-color);
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* الباب الجوزي */
        .door {
            position: absolute;
            right: 0;
            top: 40px;
            width: 180px;
            height: 310px;
            background-color: var(--door-color);
            border-left: 5px solid var(--door-dark);
            box-sizing: border-box;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        /* تفاصيل مستطيلات الباب */
        .door-panel {
            width: 100px;
            height: 100px;
            border: 4px solid var(--door-dark);
            border-radius: 4px;
        }

        .door-knob {
            position: absolute;
            left: 15px;
            top: 55%;
            width: 20px;
            height: 20px;
            background-color: #e9c46a;
            border-radius: 3px;
        }

        /* المصباح والخيط */
        .bulb-container {
            position: absolute;
            left: 200px;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 5;
        }

        /* حبل السحب وتأثير المرونة والاهتزاز */
        .cord {
            width: 4px;
            height: 140px;
            background-color: var(--cord-color);
            transform-origin: top center;
            transition: transform 0.1s ease;
        }

        /* الحركة الاهتزازية عند الإفلات */
        @keyframes swing {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-10deg); }
            60% { transform: rotate(5deg); }
            80% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }

        .cord.swinging {
            animation: swing 1s ease-out;
        }

        /* مقبض السحب (الدائرة الصغيرة أسفل الخيط) */
        .cord-handle {
            width: 16px;
            height: 16px;
            background-color: var(--cord-color);
            border-radius: 50%;
            margin-top: -2px;
        }

        /* المصباح SVG */
        .bulb-svg {
            width: 80px;
            height: 100px;
            margin-top: 20px;
            transition: filter 0.3s ease;
        }

        /* إضاءة المصباح */
        .scene.lit .bulb-svg {
            filter: drop-shadow(0 0 25px #fffbb0);
        }

        .bulb-glass {
            fill: #e1e7cd;
            stroke: #222;
            stroke-width: 3;
            transition: fill 0.3s ease;
        }

        .scene.lit .bulb-glass {
            fill: #fffbb0;
        }

        /* إيد الدب */
        .bear-arm {
            position: absolute;
            right: 175px; /* يختفي ورا الباب بالبداية */
            top: 160px;
            width: 0px;
            height: 50px;
            background-color: var(--bear-fur);
            border-radius: 25px 0 0 25px;
            z-index: 8;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        /* كف الدب البارز */
        .bear-paw {
            width: 45px;
            height: 45px;
            background-color: var(--bear-pad);
            border: 4px solid var(--bear-fur);
            border-radius: 50%;
            position: absolute;
            left: -10px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* تحريك اليد عندما يشتغل الضوا */
        .scene.lit .bear-arm {
            width: 130px; /* تمدد اليد لتوصل للخيط */
        }

        .scene.lit .bear-paw {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="scene" id="scene">
    <!-- المصباح والحبل -->
    <div class="bulb-container" id="bulbContainer">
        <!-- رسمة المصباح SVG لتطابق الـ 2D الأنيق بالصورة -->
        <svg class="bulb-svg" viewBox="0 0 100 120">
            <!-- قاعدة المصباح -->
            <path d="M35 80 h30 v15 h-30 z" fill="#b0b0b0" stroke="#222" stroke-width="3"/>
            <path d="M40 95 h20 v8 h-20 z" fill="#777" stroke="#222" stroke-width="3"/>
            <!-- زجاج المصباح -->
            <path class="bulb-glass" d="M35 80 C 10 70, 10 20, 50 20 C 90 20, 90 70, 65 80 Z" />
        </svg>
        <!-- الخيط المرن -->
        <div class="cord" id="cord">
            <div class="cord-handle"></div>
        </div>
    </div>

    <!-- إيد الدب المخفية خلف الباب -->
    <div class="bear-arm" id="bearArm">
        <div class="bear-paw"></div>
    </div>

    <!-- الباب -->
    <div class="door">
        <div class="door-panel"></div>
        <div class="door-panel"></div>
        <div class="door-knob"></div>
    </div>
</div>

<script>
    const scene = document.getElementById('scene');
    const bulbContainer = document.getElementById('bulbContainer');
    const cord = document.getElementById('cord');

    let isLit = false;
    let isBusy = false; // لمنع التكرار المزعج أثناء الحركة

    // عند الضغط على الحبل أو المصباح لتشغيله
    bulbContainer.addEventListener('click', () => {
        if (isBusy) return;

        if (!isLit) {
            // 1. شغل الضوا
            isLit = true;
            scene.classList.add('lit');
            
            // تأثير حركة بسيطة للحبل عند السحب
            cord.style.transform = 'scaleY(1.1)';
            setTimeout(() => cord.style.transform = 'scaleY(1)', 150);

            // 2. بعد ثواني قليلة، الدب يضوج ويطلع إيده يطفي
            isBusy = true;
            setTimeout(() => {
                // الدب يوصل للخيط ويطفي
                isLit = false;
                scene.classList.remove('lit');
                
                // تأثير اهتزاز مرن للخيط كأنو الدب نتره وغلّس (elastic swing)
                cord.classList.add('swinging');
                
                // تنظيف كلاس الاهتزاز بعد ما يخلص الأنيميشن
                setTimeout(() => {
                    cord.classList.remove('swinging');
                    isBusy = false;
                }, 1000);

            }, 800); // الوقت اللي ينتظره الدب قبل ما يمد ايده (800 ملي ثانية)
        }
    });
</script>

</body>
</html>
