<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد متابعين إنستغرام مباشر</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .counter-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 350px;
        }
        h2 {
            margin-bottom: 5px;
            color: #e1306c;
        }
        .username {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .count {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
            margin: 20px 0;
        }
        .status {
            font-size: 12px;
            color: #00ffcc;
            margin-top: 15px;
        }
        .error {
            color: #ff3333;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2 id="profile-name">جاري التحميل...</h2>
        <div class="username">@<span id="profile-username">owl.7565474</span></div>
        
        <div class="count" id="follower-count">0</div>
        
        <div class="status" id="status-text">جاري الاتصال بإنستغرام...</div>
    </div>

    <script>
        // معلومات الحساب الوهمي والمستهدف
        const username = 'owl.7565474';
        const password = 'qp20072007';
        const targetUser = 'owl.7565474'; 

        // دالة تسجيل الدخول لجلب صلاحية الوصول
        async function loginToInstagram() {
            const statusText = document.getElementById('status-text');
            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const loginUrl = encodeURIComponent('https://www.instagram.com/accounts/login/ajax/');

            statusText.innerText = "جاري تسجيل الدخول بالحساب الوهمي...";
            statusText.classList.remove('error');

            try {
                const response = await fetch(`${proxyUrl}${loginUrl}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: `username=${encodeURIComponent(username)}&enc_password=%23PWD_INSTAGRAM_BROWSER%3A0%3A${Date.now()}%3A${encodeURIComponent(password)}`
                });

                const data = await response.json();
                const resData = JSON.parse(data.contents);

                if (resData.authenticated) {
                    statusText.innerText = "تم تسجيل الدخول! جاري جلب العداد...";
                    // تشغيل العداد فوراً وتحديثه كل 5 ثواني
                    fetchFollowers();
                    setInterval(fetchFollowers, 5000); 
                } else {
                    statusText.classList.add('error');
                    if (resData.two_factor_required) {
                        statusText.innerText = "خطأ: الحساب يطلب رمز التحقق (2FA)";
                    } else if (resData.checkpoint_url) {
                        statusText.innerText = "خطأ: إنستغرام قفل الحساب ويطلب تأكيد هوية (CheckPoint)";
                    } else {
                        statusText.innerText = "فشل الدخول: تأكد من الحساب أو أنه انحظر مؤقتاً";
                    }
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "خطأ في الاتصال بسيرفر تسجيل الدخول";
                statusText.classList.add('error');
            }
        }

        // دالة جلب العداد المباشر
        async function fetchFollowers() {
            const statusText = document.getElementById('status-text');
            const followerCount = document.getElementById('follower-count');
            const profileName = document.getElementById('profile-name');

            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const targetUrl = encodeURIComponent(`https://www.instagram.com/${targetUser}/?__a=1&__d=dis`);

            try {
                const response = await fetch(`${proxyUrl}${targetUrl}`);
                const data = await response.json();
                const jsonData = JSON.parse(data.contents);

                if (jsonData.graphql && jsonData.graphql.user) {
                    const user = jsonData.graphql.user;
                    profileName.innerText = user.full_name || user.username;
                    followerCount.innerText = user.edge_followed_by.count.toLocaleString();
                    statusText.innerText = "البث المباشر يعمل.. تحديث كل 5 ثواني";
                    statusText.classList.remove('error');
                } else {
                    statusText.innerText = "انقطع الاتصال: إنستغرام طلب تسجيل دخول مجدداً";
                    statusText.classList.add('error');
                }
            } catch (error) {
                statusText.innerText = "خطأ أثناء تحديث العداد";
                statusText.classList.add('error');
            }
        }

        // ابدأ العملية
        loginToInstagram();
    </script>
</body>
</html>
