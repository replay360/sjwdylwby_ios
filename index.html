<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>لعبة الأفعى الاحترافية المحدثة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b071e; font-family: sans-serif; }
        
        canvas { display: block; width: 100vw; height: 100vh; background-color: #0b071e; }

        /* شاشة اختيار المستوى */
        .ui-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(11, 7, 30, 0.95); transition: all 0.3s ease;
        }
        .ui-screen.hidden { opacity: 0; pointer-events: none; }
        
        .game-title { color: #00ffcc; font-size: 32px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 204, 0.6); text-align: center; }
        .game-desc { color: #a099bc; font-size: 15px; margin-bottom: 30px; text-align: center; padding: 0 20px; max-width: 400px; line-height: 1.6; }
        
        .btn-container { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 280px; }
        .menu-btn {
            padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; color: #fff; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-normal { background: #0083b0; }
        .btn-hard { background: #ff5858; }

        /* لوحة النقاط */
        .hud {
            position: absolute; top: 20px; left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 5; pointer-events: none;
            color: #fff; font-weight: bold; font-size: 14px; display: none;
        }
        .score-box { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; backdrop-filter: blur(5px); }
        
        .status-msg {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 32px; font-weight: bold; z-index: 4; text-align: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.6); pointer-events: none; opacity: 0; transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- شاشة البداية واختيار المستوى -->
    <div class="ui-screen" id="startScreen">
        <div class="game-title">تحدي الأفاعي النيون</div>
        <div class="game-desc">تحكم بمسار أفعيتك بالضغط على يمين أو يسار الشاشة لتوجيهها. خلي المنافس يصطدم بيك حتى تفوز!</div>
        <div class="btn-container">
            <button class="menu-btn btn-normal" onclick="startGame('normal')">مستوى عادي</button>
            <button class="menu-btn btn-hard" onclick="startGame('hard')">مستوى صعب 🔥</button>
        </div>
    </div>

    <!-- واجهة اللعب العليا -->
    <div class="hud" id="gameHud">
        <div class="score-box" style="border-left: 4px solid #00ffaa;">أفعيتك: <span id="playerScore">0</span></div>
        <div class="score-box" style="border-left: 4px solid #ff3333;">المنافس: <span id="aiScore">0</span></div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        let gameActive = false;
        let difficulty = 'normal';
        let speedMultiplier = 1;
        let food = { x: 0, y: 0, radius: 8 };
        
        let playerSnake = null;
        let aiSnake = null;

        class Snake {
            constructor(x, y, color, isAI) {
                this.isAI = isAI;
                this.color = color;
                this.radius = 10;
                this.segments = [];
                this.angle = isAI ? Math.PI : 0; 
                this.speed = 3.5;
                this.turnSpeed = 0.06;
                this.alive = true;

                // توليد الجسم البدئي
                let length = 12;
                for (let i = 0; i < length; i++) {
                    this.segments.push({
                        x: x - (i * this.speed * Math.cos(this.angle)),
                        y: y - (i * this.speed * Math.sin(this.angle))
                    });
                }
            }

            update() {
                if (!this.alive) return;

                // ذكاء اصطناعي بسيط لملاحقة الأكل وتوجيه الأفعى الحمراء
                if (this.isAI) {
                    let targetAngle = Math.atan2(food.y - this.segments[0].y, food.x - this.segments[0].x);
                    let diff = targetAngle - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    
                    let currentTurn = this.turnSpeed * (difficulty === 'hard' ? 1.3 : 0.8);
                    this.angle += Math.max(-currentTurn, Math.min(currentTurn, diff));
                }

                // حركة الرأس التلقائية المستمرة للأمام
                let head = this.segments[0];
                let nextX = head.x + Math.cos(this.angle) * this.speed * speedMultiplier;
                let nextY = head.y + Math.sin(this.angle) * this.speed * speedMultiplier;

                // التفاف حول حدود الشاشة بمرونة
                if (nextX < 0) nextX = width;
                if (nextX > width) nextX = 0;
                if (nextY < 0) nextY = height;
                if (nextY > height) nextY = 0;

                // تحديث موقع الجسم
                this.segments.unshift({ x: nextX, y: nextY });
                this.segments.pop();
            }

            grow() {
                let tail = this.segments[this.segments.length - 1];
                for(let i = 0; i < 3; i++) {
                    this.segments.push({ x: tail.x, y: tail.y });
                }
            }

            draw() {
                ctx.save();
                ctx.lineWidth = this.radius * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;

                // رسم جسم الأفعى كخيط نيون متصل وسلس جداً
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.stroke();
                
                // رسم نقطة مميزة لرأس الأفعى حتى تبين العين والاتجاه
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.segments[0].x, this.segments[0].y, this.radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnFood() {
            food.x = Math.random() * (width - 60) + 30;
            food.y = Math.random() * (height - 60) + 30;
        }

        function drawFood() {
            ctx.save();
            ctx.fillStyle = '#ffcc00';
            ctx.shadowColor = '#ffcc00';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function checkCollisions() {
            if (!playerSnake || !aiSnake || !playerSnake.alive || !aiSnake.alive) return;

            let pHead = playerSnake.segments[0];
            let aHead = aiSnake.segments[0];

            // 1. أكل النقاط
            if (Math.hypot(pHead.x - food.x, pHead.y - food.y) < playerSnake.radius + food.radius) {
                playerSnake.grow();
                spawnFood();
                document.getElementById('playerScore').innerText = playerSnake.segments.length - 12;
            }
            if (Math.hypot(aHead.x - food.x, aHead.y - food.y) < aiSnake.radius + food.radius) {
                aiSnake.grow();
                spawnFood();
                document.getElementById('aiScore').innerText = aiSnake.segments.length - 12;
            }

            // 2. فحص موت اللاعب (إذا دعم بجسم الخصم)
            for (let i = 0; i < aiSnake.segments.length; i++) {
                let seg = aiSnake.segments[i];
                if (Math.hypot(pHead.x - seg.x, pHead.y - seg.y) < playerSnake.radius + 2) {
                    playerSnake.alive = false;
                }
            }

            // 3. فحص موت الخصم (إذا دعم بجسم اللاعب)
            for (let i = 0; i < playerSnake.segments.length; i++) {
                let seg = playerSnake.segments[i];
                if (Math.hypot(aHead.x - seg.x, aHead.y - seg.y) < aiSnake.radius + 2) {
                    aiSnake.alive = false;
                }
            }

            // معالجة الشروط والنهاية المزدوجة
            if (!playerSnake.alive && !aiSnake.alive) {
                endGame("فوز ساحق! دمرتهما معاً 💥");
            } else if (!playerSnake.alive) {
                endGame("خسرت! اصطدمت بالمنافس 💀");
            } else if (!aiSnake.alive) {
                endGame("كفوو! فزت ودمرت المنافس 🎉");
            }
        }

        function endGame(text) {
            gameActive = false;
            let msg = document.getElementById('statusMsg');
            msg.innerText = text;
            msg.style.opacity = "1";
            
            setTimeout(() => {
                msg.style.opacity = "0";
                document.getElementById('gameHud').style.display = 'none';
                document.getElementById('startScreen').classList.remove('hidden');
            }, 2500);
        }

        // تحكم اللمس الفعال والسلس جداً (يمين ويسار الشاشة)
        window.addEventListener('touchstart', (e) => {
            if (!gameActive || !playerSnake) return;
            let touchX = e.touches[0].clientX;
            if (touchX < width / 2) {
                playerSnake.angle -= 0.4; // لف يسار
            } else {
                playerSnake.angle += 0.4; // لف يمين
            }
        }, { passive: true });

        // تحكم الكيبورد الاحتياطي للحاسبة
        window.addEventListener('keydown', (e) => {
            if (!gameActive || !playerSnake) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') playerSnake.angle -= 0.3;
            if (e.key === 'ArrowRight' || e.key === 'd') playerSnake.angle += 0.3;
        });

        function startGame(lvl) {
            initCanvas(); // تحديث الأبعاد عند كبس الزر مباشرة لضمان الظهور
            difficulty = lvl;
            speedMultiplier = difficulty === 'hard' ? 1.4 : 1.0;
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameHud').style.display = 'flex';
            
            // توليد آمن ومضمون 100% في منتصف ساحة اللعب الحالية
            playerSnake = new Snake(width * 0.25, height * 0.5, '#00ffaa', false);
            aiSnake = new Snake(width * 0.75, height * 0.5, '#ff3333', true);
            
            document.getElementById('playerScore').innerText = "0";
            document.getElementById('aiScore').innerText = "0";
            
            spawnFood();
            gameActive = true;
        }

        function loop() {
            // تنظيف الساحة بمسح كامل وصبغها باللون الغامق المميز
            ctx.fillStyle = '#0b071e';
            ctx.fillRect(0, 0, width, height);

            if (gameActive) {
                playerSnake.update();
                aiSnake.update();
                checkCollisions();
            }

            // رسم العناصر الأساسية
            drawFood();
            if (playerSnake) playerSnake.draw();
            if (aiSnake) aiSnake.draw();

            requestAnimationFrame(loop);
        }
        // تشغيل حلقة الرسم الأساسية فوراً
        loop();
    </script>
</body>
</html>
