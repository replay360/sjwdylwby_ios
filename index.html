<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة تحكم مستقبلي احترافي</title>
    <style>
        /* تصنيفات عامة لتصفير المسافات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0b0f19;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #ffffff;
        }

        /* هيكل التلفون الخارجي الذكي */
        .phone-container {
            position: relative;
            width: 393px;
            height: 852px; /* أبعاد الآيفون القياسية */
            background: url('1000023143.png') no-repeat center/cover; /* أو خلفية ناعمة إذا لم تتوفر الصورة */
            background-color: #1a233a;
            border: 12px solid #2d3139;
            border-radius: 55px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* الكاميرا الأمامية الجزيرة التفاعلية (Dynamic Island) */
        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background-color: #000000;
            border-radius: 20px;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* الشاشة الرئيسية والتطبيقات */
        .screen-content {
            width: 100%;
            height: 100%;
            padding: 60px 20px 40px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 25px 20px;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* حالة الابتعاد والضبابية عند فتح مركز التحكم */
        .phone-container.control-active .screen-content {
            transform: scale(0.92);
            filter: blur(20px);
        }

        /* تصميم أيقونات التطبيقات يدوياً بالـ CSS */
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .app-icon-wrapper:active {
            transform: scale(0.88);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        /* رسم أيقونة الهاتف بـ CSS */
        .icon-phone {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        .icon-phone::before {
            content: '';
            width: 26px;
            height: 26px;
            border: 4px solid white;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            display: block;
            position: absolute;
            border-bottom: none;
            border-left: none;
        }

        /* رسم أيقونة الرسائل بـ CSS */
        .icon-messages {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .icon-messages::before {
            content: '';
            width: 28px;
            height: 20px;
            border: 3px solid white;
            border-radius: 6px;
            position: absolute;
        }
        .icon-messages::after {
            content: '';
            position: absolute;
            bottom: 16px;
            left: 22px;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid white;
            transform: rotate(45deg);
        }

        /* رسم أيقونة الإعدادات بـ CSS (الترس) */
        .icon-settings {
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
        }
        .icon-settings::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 5px dashed white;
            border-radius: 50%;
            position: absolute;
            animation: rotateSettings 10s linear infinite;
        }
        .icon-settings::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: #7f8c8d;
            border-radius: 50%;
            position: absolute;
            border: 3px solid white;
        }

        @keyframes rotateSettings {
            100% { transform: rotate(360deg); }
        }

        .app-label {
            font-size: 11px;
            margin-top: 6px;
            text-align: center;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* منطقة السحب العلوية غير المرئية لتنزيل مركز التحكم */
        .drag-zone-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            z-index: 110;
            cursor: translateY-resize;
        }

        .drag-indicator {
            width: 40px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- حاوية التلفون -->
    <div class="phone-container" id="phoneContainer">
        
        <!-- الجزيرة التفاعلية -->
        <div class="dynamic-island"></div>
        
        <!-- منطقة السحب لمركز التحكم -->
        <div class="drag-zone-top" id="dragZone">
            <div class="drag-indicator"></div>
        </div>

        <!-- الشاشة الرئيسية والتطبيقات -->
        <div class="screen-content">
            
            <!-- تطبيق الهاتف -->
            <div class="app-icon-wrapper">
                <div class="app-icon icon-phone"></div>
                <div class="app-label">الهاتف</div>
            </div>

            <!-- تطبيق الرسائل -->
            <div class="app-icon-wrapper">
                <div class="app-icon icon-messages"></div>
                <div class="app-label">الرسائل</div>
            </div>

            <!-- تطبيق الإعدادات -->
            <div class="app-icon-wrapper">
                <div class="app-icon icon-settings"></div>
                <div class="app-label">الإعدادات</div>
            </div>

        </div>

    </div>

    <script>
        // اختبار أولي للأنيميشن بالضغط على منطقة السحب
        const container = document.getElementById('phoneContainer');
        const dragZone = document.getElementById('dragZone');

        dragZone.addEventListener('click', () => {
            container.classList.toggle('control-active');
        });
    </script>
</body>
</html>
