<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع التصاميم الرياضية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b0b0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 420px;
        }

        /* حاوية التصميم الثابتةة لمنع أي تشويه بالتحميل */
        .design-template {
            width: 400px;
            height: 500px;
            min-width: 400px;
            min-height: 500px;
            position: relative;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* حاوية الصورة الأساسية */
        .image-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        .user-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transition: filter 0.2s ease;
        }

        /* فلاتر احترافية بأسماء رسمية */
        .f-hd { filter: contrast(1.25) brightness(1.05) saturate(1.1) sharp; }
        .f-smooth { filter: brightness(1.08) contrast(0.95) saturate(1.05) blur(0.3px); }
        .f-contrast { filter: contrast(1.35) saturate(1.25); }
        .f-cinematic { filter: contrast(1.15) saturate(0.65) hue-rotate(-5deg); }
        .f-warm { filter: sepia(0.2) contrast(1.15) saturate(1.1); }

        /* تدريج ناعم لمنع الحواف الحادة */
        .bottom-smooth-shadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 45%, transparent 100%);
            z-index: 2;
        }

        /* تصحيح مشكلة الحقوق المعكوسة من image_9.png */
        .rights-text {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            display: flex;
            gap: 5px;
            direction: ltr; /* لضمان ترتيب الكلمات بالشكل الصحيح دائماً */
        }

        /* منطقة النصوص والمسافات المتناسقة */
        .text-wrap {
            position: absolute;
            bottom: 25px;
            width: 100%;
            z-index: 6;
            text-align: center;
            padding: 0 25px;
            box-sizing: border-box;
        }

        .text-main {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .text-sub {
            font-size: 22px;
            font-weight: 900;
            color: #cc2027;
            margin: 10px 0 0 0;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        .alarm-icon {
            display: none;
            width: 44px;
            height: 44px;
            background: linear-gradient(to bottom, #ff2a35, #cc2027);
            border-radius: 12px;
            margin: 0 auto 14px auto;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(204,32,39,0.5);
            border: 1px solid #b01a1f;
        }

        /* تفاصيل القوالب الثلاثة */
        .tmpl-first .glow-background {
            position: absolute;
            bottom: -30px;
            width: 100%;
            height: 180px;
            z-index: 3;
            background: radial-gradient(circle, rgba(204,32,39,0.25) 0%, rgba(0,77,152,0.2) 50%, transparent 80%);
            filter: blur(15px);
        }
        .tmpl-first .text-sub { color: #ff4a4a; }

        .tmpl-second { border-radius: 0 0 45px 45px; }
        .tmpl-second .laporta-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 15, 52, 0.98) 0%, rgba(16, 26, 82, 0.85) 50%, transparent 100%);
            z-index: 3;
        }
        .tmpl-second .laporta-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 8px;
            display: flex;
            z-index: 4;
        }
        .tmpl-second .laporta-bar .b-red { flex: 1; background: #cc2027; }
        .tmpl-second .laporta-bar .b-blue { flex: 1; background: #004d98; }
        .tmpl-second .text-wrap { bottom: 35px; }
        .tmpl-second .text-sub { color: #ff3b3b; }

        .tmpl-third .rodri-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 44px;
            background: linear-gradient(to top, #050507 80%, rgba(5,5,7,0.2) 100%);
            z-index: 4;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .tmpl-third .rodri-subbar-left {
            width: 120px;
            height: 10px;
            background: #004d98;
            transform: skewX(-35deg);
            margin-left: -20px;
            margin-bottom: 5px;
        }
        .tmpl-third .rodri-subbar-right {
            width: 120px;
            height: 10px;
            background: #cc2027;
            transform: skewX(35deg);
            margin-right: -20px;
            margin-bottom: 5px;
        }
        .tmpl-third .alarm-icon { display: flex; }
        .tmpl-third .text-wrap { bottom: 60px; }
        .tmpl-third .text-sub { color: #cc2027; }

        /* الأزرار والواجهات النظيفة والرسمية */
        .template-selector {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .selector-btn {
            flex: 1;
            background: #141419;
            border: 2px solid #2f2f3a;
            color: #fff;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }

        .selector-btn.active {
            border-color: #cc2027;
            background: #cc2027;
        }

        .controls {
            background: #141419;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            border: 1px solid #23232a;
            box-sizing: border-box;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }

        .control-group input[type="text"], 
        .control-group input[type="file"],
        .control-group input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2f2f3a;
            background: #1a1a22;
            color: #fff;
            box-sizing: border-box;
        }

        .filter-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            min-width: 75px;
            background: #1a1a22;
            border: 1px solid #2f2f3a;
            color: #ccc;
            padding: 8px 2px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: #cc2027;
            background: #23232f;
            color: #fff;
        }

        button.download-btn {
            width: 100%;
            padding: 12px;
            background: #cc2027;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        button.download-btn:hover {
            background: #a1161b;
        }
    </style>
</head>
<body>

    <div class="workspace">
        
        <!-- القالب المعروض بأبعاد بكسل صارمة -->
        <div class="design-template tmpl-first" id="templateContainer">
            
            <!-- تصحيح إنعكاس النص المذكور في الملاحظة -->
            <div class="rights-text">
                <span>AL HASSANI</span>
                <span>|</span>
                <span>الحساني</span>
            </div>

            <div class="glow-background" id="firstGlow"></div>
            <div class="laporta-glow" id="lpGlow" style="display:none;"></div>
            <div class="laporta-bar" id="lpBar" style="display:none;">
                <div class="b-red"></div>
                <div class="b-blue"></div>
            </div>

            <div class="rodri-bar" id="rdBar" style="display:none;">
                <div class="rodri-subbar-left"></div>
                <div class="rodri-subbar-right"></div>
            </div>

            <div class="image-container">
                <img src="" id="playerImg" class="user-image" style="display: none;">
            </div>

            <div class="bottom-smooth-shadow"></div>
            
            <div class="text-wrap">
                <div class="alarm-icon" id="alarmIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                </div>
                <h1 class="text-main" id="textMain">بيدري رودري</h1>
                <h2 class="text-sub" id="textSub">خارج الحسابات</h2>
            </div>
        </div>

        <div class="template-selector">
            <button class="selector-btn active" onclick="changeStyle('first', this)">القالب الأول</button>
            <button class="selector-btn" onclick="changeStyle('second', this)">القالب الثاني</button>
            <button class="selector-btn" onclick="changeStyle('third', this)">القالب الثالث</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>صورة اللاعب:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            
            <div class="control-group">
                <label>الفلاتر الاحترافية:</label>
                <div class="filter-container">
                    <button class="filter-btn active" onclick="applyFilter('none', this)">بدون فلتر</button>
                    <button class="filter-btn" onclick="applyFilter('f-hd', this)">فلتر HD</button>
                    <button class="filter-btn" onclick="applyFilter('f-smooth', this)">نعومة AI</button>
                    <button class="filter-btn" onclick="applyFilter('f-contrast', this)">تباين عالٍ</button>
                    <button class="filter-btn" onclick="applyFilter('f-cinematic', this)">سينمائي</button>
                    <button class="filter-btn" onclick="applyFilter('f-warm', this)">دافئ</button>
                </div>
            </div>

            <div class="control-group">
                <label>الحجم (تكبير / تصغير):</label>
                <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1">
            </div>
            <div class="control-group">
                <label>الموقع العمودي (فوق / تحت):</label>
                <input type="range" id="ySlider" min="-300" max="300" step="1" value="0">
            </div>
            <div class="control-group">
                <label>العنوان الرئيسي:</label>
                <input type="text" id="textMainInput" value="بيدري رودري">
            </div>
            <div class="control-group">
                <label>العنوان الفرعي:</label>
                <input type="text" id="textSubInput" value="خارج الحسابات">
            </div>
            <button class="download-btn" id="downloadBtn">تحميل التصميم النهائي</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const imageInput = document.getElementById('imageInput');
        const playerImg = document.getElementById('playerImg');
        const textMainInput = document.getElementById('textMainInput');
        const textSubInput = document.getElementById('textSubInput');
        const textMain = document.getElementById('textMain');
        const textSub = document.getElementById('textSub');
        const downloadBtn = document.getElementById('downloadBtn');
        const templateContainer = document.getElementById('templateContainer');
        
        const firstGlow = document.getElementById('firstGlow');
        const lpGlow = document.getElementById('lpGlow');
        const lpBar = document.getElementById('lpBar');
        const rdBar = document.getElementById('rdBar');
        const alarmIcon = document.getElementById('alarmIcon');

        const scaleSlider = document.getElementById('scaleSlider');
        const ySlider = document.getElementById('ySlider');

        let currentScale = 1;
        let currentY = 0;

        const templateTexts = {
            first: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            second: { main: 'بيدري رودري', sub: 'خارج الحسابات' },
            third: { main: 'بيدري رودري', sub: 'خارج الحسابات' }
        };

        function updateImageTransform() {
            playerImg.style.transform = `scale(${currentScale}) translateY(${currentY}px)`;
        }

        scaleSlider.addEventListener('input', (e) => {
            currentScale = e.target.value;
            updateImageTransform();
        });

        ySlider.addEventListener('input', (e) => {
            currentY = e.target.value;
            updateImageTransform();
        });

        textMainInput.addEventListener('input', () => {
            textMain.innerText = textMainInput.value;
            const activeStyle = templateContainer.classList.contains('tmpl-second') ? 'second' : (templateContainer.classList.contains('tmpl-third') ? 'third' : 'first');
            templateTexts[activeStyle].main = textMainInput.value;
        });
        
        textSubInput.addEventListener('input', () => {
            textSub.innerText = textSubInput.value;
            const activeStyle = templateContainer.classList.contains('tmpl-second') ? 'second' : (templateContainer.classList.contains('tmpl-third') ? 'third' : 'first');
            templateTexts[activeStyle].sub = textSubInput.value;
        });

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    playerImg.src = e.target.result;
                    playerImg.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        function applyFilter(filterClass, btnElement) {
            playerImg.classList.remove('f-hd', 'f-smooth', 'f-contrast', 'f-cinematic', 'f-warm');
            if(filterClass !== 'none') {
                playerImg.classList.add(filterClass);
            }
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function changeStyle(styleName, btnElement) {
            templateContainer.classList.remove('tmpl-first', 'tmpl-second', 'tmpl-third');
            
            firstGlow.style.display = 'none';
            lpGlow.style.display = 'none'; lpBar.style.display = 'none';
            rdBar.style.display = 'none'; alarmIcon.style.display = 'none';

            textMainInput.value = templateTexts[styleName].main;
            textSubInput.value = templateTexts[styleName].sub;
            textMain.innerText = templateTexts[styleName].main;
            textSub.innerText = templateTexts[styleName].sub;

            if (styleName === 'first') {
                templateContainer.classList.add('tmpl-first');
                firstGlow.style.display = 'block';
            } else if (styleName === 'second') {
                templateContainer.classList.add('tmpl-second');
                lpGlow.style.display = 'block'; lpBar.style.display = 'flex';
            } else if (styleName === 'third') {
                templateContainer.classList.add('tmpl-third');
                rdBar.style.display = 'flex'; alarmIcon.style.display = 'flex';
            }

            document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        /* دالة التحميل الذكية: تجبر الأبعاد على 400x500 وتمنع التشويه الحركي */
        downloadBtn.addEventListener('click', () => {
            html2canvas(templateContainer, {
                useCORS: true,
                scale: 3, 
                width: 400,
                height: 500,
                scrollX: 0,
                scrollY: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Al-Hassani-Design.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

</body>
</html>
