<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Light Bulb - Interactive</title>
    <style>
        :root {
            /* الألوان مأخوذة من صورتك */
            --bg-lit: #f5e4bc;
            --bg-dark: #2c2519; /* الغرفة ظلمة بالبداية */
            --door-color: #9c8a75;
            --door-dark: #847360;
            --bear-fur: #784421;
            --bear-pad: #deaa87;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0f141c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* حاوية المشهد */
        .scene {
            position: relative;
            width: 600px;
            height: 420px;
            background-color: var(--bg-dark);
            border: 4px solid #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: background-color 0.15s ease;
        }

        /* عندما تشتغل الإضاءة */
        .scene.lit {
            background-color: var(--bg-lit);
        }

        /* طبقة التظليم فوق العناصر ما عدا المصباح والباب */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .scene.lit .overlay {
            opacity: 0;
        }

        /* الباب وتأثير الفتحة */
        .door-container {
            position: absolute;
            right: 0;
            top: 50px;
            width: 210px;
            height: 370px;
            z-index: 10;
            perspective: 1000px; /* ليعطي عمق عند فتح الباب */
        }

        .door {
            width: 100%;
            height: 100%;
            background-color: var(--door-color);
            border-left: 4px solid var(--door-dark);
            box-sizing: border-box;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            transform-origin: right center;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        /* الأنيميشن: الباب ينفتح شوي على كد إيد الدب */
        .scene.door-open .door {
            transform: rotateY(-25deg);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        .door-panel {
            width: 130px;
            height: 130px;
            border: 4px solid var(--door-dark);
            border-radius: 4px;
        }

        .door-knob {
            position: absolute;
            left: 15px;
            top: 52%;
            width: 22px;
            height: 22px;
            background-color: #f0cc6c;
            border-radius: 4px;
            box-shadow: inset -2px -2px rgba(0,0,0,0.15);
        }

        /* المصباح - مطابق لملامح صورة 1000024018.jpg */
        .bulb-wrapper {
            position: absolute;
            left: 280px;
            top: 50px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bulb-svg {
            width: 65px;
            height: 85px;
        }

        .bulb-glass {
            fill: #1e2213; /* مطفأ */
            stroke: #222;
            stroke-width: 3.5;
        }
        .scene.lit .bulb-glass {
            fill: #e8f5cb; /* مشتعل نفس صورتك */
        }

        .bulb-base {
            fill: #777;
            stroke: #222;
            stroke-width: 3.5;
        }

        /* منطقة الحبل الفيزيائي (Canvas) لتأثير حبل حقيقي */
        #ropeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
            cursor: grab;
        }
        #ropeCanvas:active {
            cursor: grabbing;
        }

        /* إيد الدب البطل */
        .bear-arm-container {
            position: absolute;
            right: 170px; /* خلف الباب مباشرة */
            top: 170px;
            width: 160px;
            height: 60px;
            z-index: 4; /* وراء الباد وخلف الحبل */
            transform: translateX(160px);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex;
            align-items: center;
        }

        .scene.bear-out .bear-arm-container {
            transform: translateX(0); /* تطلع الإيد بسرعة وتضرب الخيط */
        }

        .bear-arm {
            width: 120px;
            height: 50px;
            background-color: var(--bear-fur);
            border-radius: 25px 0 0 25px;
        }

        .bear-paw {
            width: 45px;
            height: 45px;
            background-color: var(--bear-pad);
            border: 4px solid var(--bear-fur);
            border-radius: 50%;
            margin-left: -20px;
        }
    </style>
</head>
<body>

<div class="scene" id="scene">
    <div class="overlay"></div>

    <!-- المصباح المعلق -->
    <div class="bulb-wrapper">
        <svg class="bulb-svg" viewBox="0 0 100 120">
            <!-- زجاج المصباح -->
            <path class="bulb-glass" d="M 50 20 C 25 20, 20 65, 40 85 C 42 88, 45 92, 45 95 L 55 95 C 55 92, 58 88, 60 85 C 80 65, 75 20, 50 20 Z" />
            <!-- قاعدة المصباح الدائرية الجوا -->
            <rect class="bulb-base" x="40" y="95" width="20" height="15" rx="2" />
            <rect class="bulb-base" x="43" y="110" width="14" height="6" rx="1" />
        </svg>
    </div>

    <!-- نظام الحبل الفيزيائي المرن -->
    <canvas id="ropeCanvas"></canvas>

    <!-- إيد الدب -->
    <div class="bear-arm-container" id="bearArm">
        <div class="bear-paw"></div>
        <div class="bear-arm"></div>
    </div>

    <!-- الباب الحاوي على عمق 3D عند الفتح -->
    <div class="door-container">
        <div class="door">
            <div class="door-panel"></div>
            <div class="door-panel"></div>
            <div class="door-knob"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('ropeCanvas');
    const ctx = canvas.getContext('2d');
    const scene = document.getElementById('scene');

    // إعداد أبعاد الكانفاس
    function resizeCanvas() {
        canvas.width = 600;
        canvas.height = 420;
    }
    resizeCanvas();

    // نقطة تثبيت الخيط (تحت المصباح بمسافة مثل صورة 1000024018)
    const pinX = 312;
    const pinY = 160; 
    const restLength = 110; // طول الحبل الافتراضي

    // محاكاة فيزيائية للحبل (Verlet Integration) ليعطي مرونة حقيقية
    const numPoints = 8;
    let points = [];
    
    for(let i=0; i<numPoints; i++) {
        let pct = i / (numPoints - 1);
        points.push({
            x: pinX,
            y: pinY + (pct * restLength),
            oldX: pinX,
            oldY: pinY + (pct * restLength),
            pinned: i === 0
        });
    }

    const segmentLength = restLength / (numPoints - 1);
    const gravity = 0.6;
    const bounce = 0.92;

    let isDragging = false;
    let dragPoint = null;
    let isLit = false;
    let isBusy = false;

    // تحديث حركة الحبل فيزيائياً
    function updatePhysics() {
        // حرك النقاط بالجاذبية
        for (let p of points) {
            if (p.pinned) continue;
            let vx = (p.x - p.oldX) * 0.98; // احتكاك الهواء لميوعة الحركة
            let vy = (p.y - p.oldY) * 0.98;
            p.oldX = p.x;
            p.oldY = p.y;
            p.x += vx;
            p.y += vy + gravity;
        }

        // قيود المسافات بين العقد (تخلي الحبل متماسك ومرن)
        for (let i = 0; i < 6; i++) {
            for (let j = 0; j < points.length - 1; j++) {
                let p1 = points[j];
                let p2 = points[j+1];
                let dx = p2.x - p1.x;
                let dy = p2.y - p1.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let diff = segmentLength - dist;
                let percent = (diff / dist) / 2;
                let offsetX = dx * percent;
                let offsetY = dy * percent;

                if (!p1.pinned) { p1.x -= offsetX; p1.y -= offsetY; }
                if (!p2.pinned) { p2.x += offsetX; p2.y += offsetY; }
            }
        }

        // إذا كان المستخدم يسحب العقدة الأخيرة
        if (isDragging && dragPoint) {
            // كشف السحب للأسفل لتشغيل الضوا
            if (!isLit && !isBusy && dragPoint.y > (pinY + restLength + 35)) {
                triggerLightOn();
            }
        }
    }

    // رسم الحبل والمقبض الدائري الأسود الكيرفي
    function drawRope() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.strokeStyle = '#222222';
        ctx.lineWidth = 4.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();

        // رسم العقدة/المقبض الأسود أسفل الحبل طبق الأصل
        let endPoint = points[points.length - 1];
        ctx.beginPath();
        ctx.arc(endPoint.x, endPoint.y, 9, 0, Math.PI * 2);
        ctx.fillStyle = '#222222';
        ctx.fill();
    }

    // الأنيميشن المستمر
    function loop() {
        updatePhysics();
        drawRope();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // كشف المسك والتحكم بالإصبع أو الماوس
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDrag(e) {
        if (isBusy) return;
        const pos = getMousePos(e);
        let endPoint = points[points.length - 1];
        // كشف إذا ضغطت قريباً من نهاية الحبل
        let dx = pos.x - endPoint.x;
        let dy = pos.y - endPoint.y;
        if (Math.sqrt(dx*dx + dy*dy) < 30) {
            isDragging = true;
            dragPoint = endPoint;
        }
    }

    function moveDrag(e) {
        if (!isDragging || !dragPoint) return;
        const pos = getMousePos(e);
        // تقييد السحب حتى لا يتمدد الحبل بشكل مشوه
        dragPoint.x = pos.x;
        dragPoint.y = Math.max(pinY + 20, pos.y); 
    }

    function endDrag() {
        isDragging = false;
        dragPoint = null;
    }

    // التحكم بالماوس واللمس للهواتف
    canvas.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);

    canvas.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', moveDrag);
    window.addEventListener('touchend', endDrag);

    // وظيفة تشغيل الإضاءة وحركة الدب والباب العكسية
    function triggerLightOn() {
        isLit = true;
        isBusy = true;
        scene.classList.add('lit');
        endDrag(); // إفلات الحبل تلقائياً عند التفعيل

        // بعد لحظة، ينفتح الباب ويطلع الدب
        setTimeout(() => {
            scene.classList.add('door-open', 'bear-out');

            // الدب يوصل للنهاية وينتر الحبل
            setTimeout(() => {
                let endPoint = points[points.length - 1];
                // الدب يدفع الحبل لليسار بقوة عشان يطفي
                endPoint.x -= 50; 
                
                // إطفاء الإضاءة
                isLit = false;
                scene.classList.remove('lit');

                // الدب يرجع والباب ينغلق
                setTimeout(() => {
                    scene.classList.remove('door-open', 'bear-out');
                    isBusy = false;
                }, 300);

            }, 450);

        }, 400);
    }
</script>

</body>
</html>
