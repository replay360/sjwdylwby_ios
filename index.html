<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jelly Soft-Body Rectangle</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #0b0c2a, #2a0b3d, #4a102a, #0a1f3a);
    background-size: 400% 400%;
    animation: gradientFlow 25s ease infinite;
    touch-action: none;
  }
  @keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  canvas { display: block; width: 100%; height: 100%; }
.hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.8); font-family: system-ui, sans-serif; font-size: 14px;
    backdrop-filter: blur(10px); background: rgba(0,0,0,0.25); padding: 8px 16px;
    border-radius: 20px; pointer-events: none; user-select: none; border: 1px solid rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">اسحب المستطيل الجيلي بإصبعك</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: true });

let W = window.innerWidth;
let H = window.innerHeight;
function resizeCanvas(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  initJelly();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ========= إعدادات الفيزياء ========= */
const CFG = {
  GRID_W: 10, GRID_H: 6,
  STIFF: 0.14, SHEAR: 0.09, DAMP: 0.91,
  MAX_V: 20, MAX_STRETCH: 2.2, BOUNCE: 0.35, DRAG_K: 0.4
};

class P {
  constructor(x,y,ox,oy){
    this.x=x; this.y=y; this.ox=ox; this.oy=oy;
    this.vx=0; this.vy=0; this.ax=0; this.ay=0;
  }
  f(fx,fy){ this.ax+=fx; this.ay+=fy; }
  step(){
    this.vx+=this.ax; this.vy+=this.ay;
    const v=Math.hypot(this.vx,this.vy);
    if(v>CFG.MAX_V){ const s=CFG.MAX_V/v; this.vx*=s; this.vy*=s; }
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=CFG.DAMP; this.vy*=CFG.DAMP;
    this.ax=0; this.ay=0;
    if(this.x<0){this.x=0;this.vx*=-CFG.BOUNCE;}
    if(this.x>W){this.x=W;this.vx*=-CFG.BOUNCE;}
    if(this.y<0){this.y=0;this.vy*=-CFG.BOUNCE;}
    if(this.y>H){this.y=H;this.vy*=-CFG.BOUNCE;}
  }
  restore(){
    this.f((this.ox-this.x)*CFG.STIFF, (this.oy-this.y)*CFG.STIFF);
  }
}

class S {
  constructor(a,b,len,k){this.a=a;this.b=b;this.len=len;this.k=k;}
  step(){
    let dx=this.b.x-this.a.x, dy=this.b.y-this.a.y;
    let d=Math.hypot(dx,dy)||0.001;
    if(d>this.len*CFG.MAX_STRETCH){d=this.len*CFG.MAX_STRETCH;}
    const f=(d-this.len)*this.k;
    const fx=f*dx/d, fy=f*dy/d;
    this.a.f(fx,fy); this.b.f(-fx,-fy);
  }
}

let pts=[], spr=[];
let cols, rows, dx, dy;

function initJelly(){
  pts=[]; spr=[];
  const rw=Math.min(W,H)*0.55, rh=rw*0.6;
  const sx=(W-rw)/2, sy=(H-rh)/2;
  cols=CFG.GRID_W; rows=CFG.GRID_H;
  dx=rw/(cols-1); dy=rh/(rows-1);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      pts.push(new P(sx+x*dx, sy+y*dy, sx+x*dx, sy+y*dy));
    }
  }
  const id=(x,y)=>y*cols+x;
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(x<cols-1) spr.push(new S(pts[id(x,y)], pts[id(x+1,y)], dx, CFG.STIFF));
      if(y<rows-1) spr.push(new S(pts[id(x,y)], pts[id(x,y+1)], dy, CFG.STIFF));
      if(x<cols-1&&y<rows-1){
        const dl=Math.hypot(dx,dy);
        spr.push(new S(pts[id(x,y)], pts[id(x+1,y+1)], dl, CFG.SHEAR));
        spr.push(new S(pts[id(x+1,y)], pts[id(x,y+1)], dl, CFG.SHEAR));
      }
    }
  }
}

/* ========= السحب ماوس + لمس ========= */
let drag=null, offx=0, offy=0;
function pos(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; }
function near(x,y){
  let best=null, bd=70;
  for(const p of pts){ const d=Math.hypot(p.x-x,p.y-y); if(d<bd){bd=d;best=p;} }
  return best;
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();const p=pos(e);drag=near(p.x,p.y);if(drag){offx=drag.x-p.x;offy=drag.y-p.y;drag.vx=drag.vy=0;}},{passive:false});
canvas.addEventListener('mousemove',e=>{if(!drag)return;e.preventDefault();const p=pos(e);drag.f((p.x+offx-drag.x)*CFG.DRAG_K,(p.y+offy-drag.y)*CFG.DRAG_K);},{passive:true});
addEventListener('mouseup',()=>drag=null,{passive:true});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=pos(e);drag=near(p.x,p.y);if(drag){offx=drag.x-p.x;offy=drag.y-p.y;drag.vx=drag.vy=0;}},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();const p=pos(e);drag.f((p.x+offx-drag.x)*CFG.DRAG_K,(p.y+offy-drag.y)*CFG.DRAG_K);},{passive:false});
addEventListener('touchend',()=>drag=null,{passive:true});

/* ========= الرسم ========= */
function draw(){
  ctx.clearRect(0,0,W,H);

  // ناخذ نقاط المحيط فقط بالترتيب الصحيح
  const ring=[];
  for(let x=0;x<cols;x++) ring.push(pts[x]); // top
  for(let y=1;y<rows;y++) ring.push(pts[y*cols+cols-1]); // right
  for(let x=cols-2;x>=0;x--) ring.push(pts[(rows-1)*cols+x]); // bottom
  for(let y=rows-2;y>0;y--) ring.push(pts[y*cols]); // left

  ctx.save();

  // 1. رسم الجيلي الضبابي
  ctx.beginPath();
  ctx.moveTo(ring[0].x, ring[0].y);
  for(let i=0;i<ring.length;i++){
    const p1=ring[i], p2=ring[(i+1)%ring.length];
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    ctx.quadraticCurveTo(p1.x,p1.y,mx,my); // زوايا ناعمة دائرية
  }
  ctx.closePath();

  // طبقة الزجاج
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.fill();
  ctx.filter='blur(14px)';
  ctx.fill();
  ctx.filter='none';

  // إطار لمعة
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.restore();
}

function tick(){
  for(const p of pts) p.restore();
  for(const s of spr) s.step();
  for(const p of pts) p.step();
  draw();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
