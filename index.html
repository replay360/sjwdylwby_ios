<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستطيل الجيلي الانسيابي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #060312; }
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(135deg, #070414, #12082b, #2b063b, #420a39, #0a2436);
            background-size: 400% 400%; animation: ultraGradient 16s ease infinite;
        }
        @keyframes ultraGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="jellyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('jellyCanvas');
        const ctx = canvas.getContext('2d');
        let dpr = window.devicePixelRatio || 1;

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr); // حل مشكلة البكسلة وتنعيم الخطوط
        }
        window.addEventListener('resize', resize); resize();

        // فيزياء متزنة ومقاومة للانعقاد والتداخل
        const STIFFNESS = 0.12; const DAMPING = 0.85;
        let particles = [], springs = [], dragged = null;

        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.mass = 1.5; }
            update() {
                if (this === dragged) return;
                this.vx *= DAMPING; this.vy *= DAMPING;
                this.x += this.vx; this.y += this.vy;
                // حدود الشاشة
                const b = 30; const w = window.innerWidth; const h = window.innerHeight;
                if (this.x < b) { this.x = b; this.vx *= -0.2; }
                if (this.x > w - b) { this.x = w - b; this.vx *= -0.2; }
                if (this.y < b) { this.y = b; this.vy *= -0.2; }
                if (this.y > h - b) { this.y = h - b; this.vy *= -0.2; }
            }
        }

        class Spring {
            constructor(p1, p2, len) { this.p1 = p1; this.p2 = p2; this.len = len; }
            update() {
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy); if (dist === 0) return;
                let force = ((this.len - dist) / dist) * STIFFNESS;
                let fx = dx * force, fy = dy * force;
                if (this.p1 !== dragged) { this.p1.vx -= fx / this.p1.mass; this.p1.vy -= fy / this.p1.mass; }
                if (this.p2 !== dragged) { this.p2.vx += fx / this.p2.mass; this.p2.vy += fy / this.p2.mass; }
            }
        }

        function init() {
            particles = []; springs = [];
            const w = window.innerWidth; const h = window.innerHeight;
            const cx = w / 2, cy = h / 2;
            const rw = 220, rh = 140; // أبعاد المستطيل

            // نقااط الزوايا والأسطح الخارجية فقط لمنع تداخل العقد
            let countX = 6, countY = 4;
            // الحافة العلوية
            for (let i = 0; i < countX; i++) particles.push(new Particle(cx - rw/2 + (rw / (countX - 1)) * i, cy - rh/2));
            // الحافة اليمنى
            for (let i = 1; i < countY; i++) particles.push(new Particle(cx + rw/2, cy - rh/2 + (rh / (countY - 1)) * i));
            // الحافة السفلية
            for (let i = countX - 2; i >= 0; i--) particles.push(new Particle(cx - rw/2 + (rw / (countX - 1)) * i, cy + rh/2));
            // الحافة اليسرى
            for (let i = countY - 2; i > 0; i--) particles.push(new Particle(cx - rw/2, cy - rh/2 + (rh / (countY - 1)) * i));

            // مركز ثقل داخلي يربط كل النقاط لمنع الانقلاب والتداخل
            let center = new Particle(cx, cy);
            particles.push(center);

            // ربط المحيط الخارجي بسبرنغات دائرية قطرية
            for (let i = 0; i < particles.length - 1; i++) {
                let next = (i === particles.length - 2) ? 0 : i + 1;
                let dist = Math.hypot(particles[next].x - particles[i].x, particles[next].y - particles[i].y);
                springs.push(new Spring(particles[i], particles[next], dist));
                
                // ربط كل نقطة بالمركز للمحافظة على كيان المستطيل الضبابي
                let cDist = Math.hypot(center.x - particles[i].x, center.y - particles[i].y);
                springs.push(new Spring(particles[i], center, cDist));
            }
        }
        init();

        function getMousePos(e) {
            let t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }
        window.addEventListener('mousedown', (e) => start(getMousePos(e).x, getMousePos(e).y));
        window.addEventListener('mousemove', (e) => move(getMousePos(e).x, getMousePos(e).y));
        window.addEventListener('mouseup', () => dragged = null);
        window.addEventListener('touchstart', (e) => start(getMousePos(e).x, getMousePos(e).y), { passive: true });
        window.addEventListener('touchmove', (e) => move(getMousePos(e).x, getMousePos(e).y), { passive: true });
        window.addEventListener('touchend', () => dragged = null);

        function start(mx, my) {
            let close = null, minDist = 50;
            particles.forEach(p => { let d = Math.hypot(p.x - mx, p.y - my); if (d < minDist) { minDist = d; close = p; } });
            dragged = close;
        }
        function move(mx, my) { if (dragged) { dragged.x = mx; dragged.y = my; dragged.vx = 0; dragged.vy = 0; } }

        function loop() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (let k = 0; k < 5; k++) springs.forEach(s => s.update());
            particles.forEach(p => p.update());

            // رسم المستطيل بمنحنيات فيزيائية ناعمة جداً لمنع التكسر
            ctx.beginPath();
            let pCount = particles.length - 1;
            ctx.moveTo(particles[0].x, particles[0].y);
            
            for (let i = 0; i < pCount; i++) {
                let next = (i + 1) % pCount;
                let xc = (particles[i].x + particles[next].x) / 2;
                let yc = (particles[i].y + particles[next].y) / 2;
                ctx.quadraticCurveTo(particles[i].x, particles[i].y, xc, yc);
            }
            ctx.closePath();

            ctx.lineJoin = "round";
            ctx.lineWidth = 12;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; // تأثير الحافة القطرية الناعمة
            ctx.stroke();

            // تعبئة المستطيل بمظهر ضبابي زجاجي (Frosted Glass Effect)
            ctx.fillStyle = "rgba(255, 255, 255, 0.07)";
            ctx.fill();

            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
            ctx.stroke();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
