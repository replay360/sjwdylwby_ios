<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Lost</title>
    <!-- خط Arvo مثل اللي بالصورة -->
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1f2326; /* الخلفية الغامقة المحيطة */
            font-family: 'Arvo', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية الصفحة البيضاء مثل الصورة 1000023975.jpg */
        .page_404 {
            padding: 40px 20px;
            background: #fff;
            text-align: center;
            max-width: 600px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .page_404 h1 {
            font-size: 80px;
            margin: 0;
            color: #333;
        }

        /* حاوية الأنميشن والرسم */
        .four_zero_four_bg {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            margin-bottom: 20px;
        }

        /* تنسيق عناصر الـ SVG ليصير التفاعل وية اللمس واضح */
        .interactive-part {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .interactive-part:hover {
            filter: brightness(1.2);
        }

        .contant_box_404 {
            margin-top: 20px;
        }

        .contant_box_404 h3 {
            font-size: 24px;
            margin: 10px 0;
            color: #222;
        }

        .contant_box_404 p {
            color: #777;
            font-size: 14px;
        }

        /* الزر الأخضر مثل الكود بالصورة */
        .Link_404 {
            color: #fff !important;
            padding: 10px 20px;
            background: #39ac31;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="page_404">
        <h1>404</h1>
        
        <!-- هنا الرسمة التفاعلية بالكود بدون صور خارجية -->
        <div class="four_zero_four_bg">
            <svg width="250" height="250" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- الأرضية والحجر -->
                <ellipse cx="100" cy="180" rx="80" ry="10" fill="#e0e0e0" />
                <circle cx="40" cy="170" r="15" fill="#bdc3c7" />
                <circle cx="42" cy="150" r="10" fill="#95a5a6" />
                
                <!-- جسم الشخصية الكهفية -->
                <g id="caveman">
                    <!-- الرجلين (تفاعلية) -->
                    <g id="legs" class="interactive-part">
                        <rect x="85" y="140" width="10" height="30" rx="4" fill="#d35400" />
                        <rect x="105" y="140" width="10" height="30" rx="4" fill="#d35400" />
                    </g>
                    
                    <!-- الجسم والملابس -->
                    <path d="M 75 140 L 125 140 L 115 80 L 85 80 Z" fill="#f39c12" />
                    <!-- نقاط الفرو بالملابس -->
                    <circle cx="90" cy="100" r="3" fill="#2c3e50" />
                    <circle cx="110" cy="120" r="4" fill="#2c3e50" />
                    <circle cx="100" cy="95" r="3" fill="#2c3e50" />

                    <!-- الرأس واللحية -->
                    <circle cx="100" cy="65" r="20" fill="#f39c12" /> <!-- البشرة -->
                    <path d="M 80 65 Q 100 95 120 65 Z" fill="#5c3a21" /> <!-- اللحية البرية -->
                    <circle cx="93" cy="60" r="2" fill="#000" /> <!-- العين -->
                    <circle cx="107" cy="60" r="2" fill="#000" /> <!-- العين -->

                    <!-- الإيد اليسرى (صايرة ورا) -->
                    <line x1="75" y1="90" x2="60" y2="110" stroke="#d35400" stroke-width="8" stroke-linecap="round" />

                    <!-- الإيد اليمنى المتحركة والتفاعلية مالت الحبل -->
                    <g id="right-arm" class="interactive-part">
                        <line x1="120" y1="90" x2="140" y2="70" stroke="#d35400" stroke-width="8" stroke-linecap="round" id="arm-bone" />
                    </g>
                </g>

                <!-- الحبل المربوط -->
                <path d="M 140 70 Q 170 120 180 170" stroke="#2c3e50" stroke-width="4" fill="none" stroke-linecap="round" />
                <rect x="170" y="160" width="20" height="20" fill="#7f8c8d" rx="2" />
            </svg>
        </div>
        
        <div class="contant_box_404">
            <h3>Look like you're lost</h3>
            <p>the page you are looking for not available!</p>
            <a href="#" class="Link_404">Go to Home</a>
        </div>
    </div>

    <!-- كود الجافاسكربت للتفاعل والتحريك -->
    <script>
        const arm = document.getElementById('right-arm');
        const legs = document.getElementById('legs');

        // تفاعل الإيد عند الضغط (تسوي حركة سريعة فوق وجوا)
        arm.addEventListener('click', () => {
            arm.style.transformOrigin = "120px 90px";
            arm.style.transition = "transform 0.1s ease-in-out";
            arm.style.transform = "rotate(-20deg)";
            
            setTimeout(() => {
                arm.style.transform = "rotate(15deg)";
            }, 100);
            
            setTimeout(() => {
                arm.style.transform = "rotate(0deg)";
            }, 200);
        });

        // تفاعل الرجلين عند الضغط (تتحرك كأنو يطفر)
        legs.addEventListener('click', () => {
            legs.style.transformOrigin = "100px 140px";
            legs.style.transition = "transform 0.1s ease-in-out";
            legs.style.transform = "scaleY(0.7)";
            
            setTimeout(() => {
                legs.style.transform = "scaleY(1.2) translateY(-10px)";
            }, 100);
            
            setTimeout(() => {
                legs.style.transform = "scaleY(1)";
            }, 200);
        });
    </script>
</body>
</html>
