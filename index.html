<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Physics Sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* خلفية الألوان المتحركة */
        body {
            background: linear-gradient(45deg, #120c1f, #1a103c, #2b1055, #511845);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="jellyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('jellyCanvas');
        const ctx = canvas.getContext('2d');

        // ضبط حجم الكانفاس
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // إعدادات الفيزياء (تكدر تعدل عليها حتى تغير الثقل والمرونة)
        const GRAVITY = 0.0; 
        const STIFFNESS = 0.04; // قوة السبرنغ (كل ما تقل كل ما يصير مطاطي أكثر)
        const DAMPING = 0.88;   // لزوجة الجيلي وثقله (كل ما تقل يزيد الثقل والتباطؤ)
        const ROWS = 6;         // عدد النقاط بالطول
        const COLS = 10;        // عدد النقاط بالعرض
        const SPACING = 30;     // المسافة بين النقاط

        let particles = [];
        let springs = [];
        let draggedParticle = null;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.ox = x;
                this.oy = y;
                this.vx = 0;
                this.vy = 0;
                this.mass = 1.2; // وزن النقطة
            }
            update() {
                if (this === draggedParticle) return;
                this.vy += GRAVITY;
                this.vx *= DAMPING;
                this.vy *= DAMPING;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        class Spring {
            constructor(p1, p2, length) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = length;
            }
            update() {
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance === 0) return;
                
                let diff = this.length - distance;
                let force = (diff / distance) * STIFFNESS;
                
                let fx = dx * force;
                let fy = dy * force;

                if (this.p1 !== draggedParticle) {
                    this.p1.vx -= fx / this.p1.mass;
                    this.p1.vy -= fy / this.p1.mass;
                }
                if (this.p2 !== draggedParticle) {
                    this.p2.x += fx / this.p2.mass;
                    this.p2.y += fy / this.p2.mass;
                }
            }
        }

        // إنشاء شبكة الجيلي في منتصف الشاشة
        function initJelly() {
            particles = [];
            springs = [];
            let startX = (canvas.width - (COLS - 1) * SPACING) / 2;
            let startY = (canvas.height - (ROWS - 1) * SPACING) / 2;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    particles.push(new Particle(startX + c * SPACING, startY + r * SPACING));
                }
            }

            // ربط النقاط بالسبرنغات (أفقياً، عمودياً، وقطرياً للمحافظة على الشكل الرئيسي)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let i = r * COLS + c;
                    // أفقي
                    if (c < COLS - 1) springs.push(new Spring(particles[i], particles[i + 1], SPACING));
                    // عمودي
                    if (r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS], SPACING));
                    // قطري يمين
                    if (c < COLS - 1 && r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS + 1], Math.sqrt(2) * SPACING));
                    // قطري يسار
                    if (c > 0 && r < ROWS - 1) springs.push(new Spring(particles[i], particles[i + COLS - 1], Math.sqrt(2) * SPACING));
                }
            }
        }

        initJelly();

        // السحب والتحكم بالماوس أو اللمس
        function handleStart(mx, my) {
            let closest = null;
            let minDist = 40; // مسافة الالتقاط
            particles.forEach(p => {
                let dist = Math.hypot(p.x - mx, p.y - my);
                if (dist < minDist) {
                    minDist = dist;
                    closest = p;
                }
            });
            draggedParticle = closest;
        }

        function handleMove(mx, my) {
            if (draggedParticle) {
                draggedParticle.x = mx;
                draggedParticle.y = my;
            }
        }

        function handleEnd() {
            draggedParticle = null;
        }

        window.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) handleStart(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', handleEnd);

        // حلقة التحديث والرسم المستمر
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // هزات خفيفة طبيعية حتى يضل الجيلي يتحرك تلقائياً
            if (!draggedParticle && Math.random() < 0.03) {
                let randomP = particles[Math.floor(Math.random() * particles.length)];
                randomP.vx += (Math.random() - 0.5) * 5;
                randomP.vy += (Math.random() - 0.5) * 5;
            }

            // تحديث الفيزياء عدة مرات في الفريم الواحد لزيادة الدقة والتقل
            for (let k = 0; k < 6; k++) {
                springs.forEach(s => s.update());
            }
            particles.forEach(p => p.update());

            // رسم المستطيل المشوه ككتلة وحدة ناعمة
            ctx.beginPath();
            // رسم المحيط الخارجي للشبكة
            // الحافة العلوية
            for (let c = 0; c < COLS; c++) ctx.lineTo(particles[c].x, particles[c].y);
            // الحافة اليمنى
            for (let r = 1; r < ROWS; r++) ctx.lineTo(particles[r * COLS + (COLS - 1)].x, particles[r * COLS + (COLS - 1)].y);
            // الحافة السفلية
            for (let c = COLS - 2; c >= 0; c--) ctx.lineTo(particles[(ROWS - 1) * COLS + c].x, particles[(ROWS - 1) * COLS + c].y);
            // الحافة اليسرى
            for (let r = ROWS - 2; r >= 0; r--) ctx.lineTo(particles[r * COLS].x, particles[r * COLS].y);

            ctx.closePath();
            
            // لون الجيلي (نصف شفاف حتى يبين المطاط)
            ctx.fillStyle = 'rgba(0, 229, 255, 0.7)';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
